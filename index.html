<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate GCSE Revision App 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script src="https://kit.fontawesome.com/7a3c1e6b3c.js" crossorigin="anonymous"></script>

<style>
body {
  font-family:'Inter',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#4f7cff,#6dd5ed);
  color:#1f2937;
}

.dark { background:#0f172a; color:white; }

/* Sidebar */
.sidebar {
  position:fixed;
  width:260px;
  height:100%;
  background:rgba(79,124,255,0.85);
  backdrop-filter:blur(15px);
  padding:20px;
  color:white;
}
.sidebar button {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  background:none;
  border:none;
  color:white;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}
.sidebar button:hover { background:rgba(255,255,255,0.2); }

/* Main */
.main { margin-left:280px; padding:25px; }

/* Cards */
.card {
  background:rgba(255,255,255,0.9);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  margin-bottom:20px;
}

/* Buttons */
button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#4f7cff,#34c759);
  color:white;
  cursor:pointer;
}
button:hover { transform:scale(1.05); }

/* Inputs */
input,select,textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

/* Stats */
.dashboard-stats { display:flex; gap:15px; }
.stat-card { flex:1; padding:20px; border-radius:15px; color:white; text-align:center; }
.stat-xp { background:#4f7cff; }
.stat-level { background:#ff9500; }
.stat-streak { background:#ff2d55; }

/* Memory */
.memory-card {
  width:60px;height:60px;background:#4f7cff;color:white;
  display:inline-flex;align-items:center;justify-content:center;
  margin:5px;border-radius:10px;cursor:pointer;
}

/* Flashcards */
.flashcard {
  width:200px;height:120px;background:#4f7cff;color:white;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;margin:5px;cursor:pointer;
}

.section { display:none; }
.active { display:block; }

</style>
</head>

<body>

<div class="sidebar">
<h2>GCSE App</h2>
<button onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</button>
<button onclick="showSection('quiz')"><i class="fas fa-brain"></i> Quiz</button>
<button onclick="showSection('timetable')"><i class="fas fa-calendar"></i> Timetable</button>
<button onclick="showSection('analytics')"><i class="fas fa-chart-bar"></i> Analytics</button>
<button onclick="showSection('pomodoro')"><i class="fas fa-clock"></i> Pomodoro</button>
<button onclick="showSection('minigame')"><i class="fas fa-gamepad"></i> Mini Game</button>
<button onclick="showSection('flashcards')"><i class="fas fa-layer-group"></i> Flashcards</button>
<button onclick="showSection('notes')"><i class="fas fa-sticky-note"></i> Notes</button>
<button onclick="showSection('settings')"><i class="fas fa-cog"></i> Settings</button>
<button onclick="toggleDark()"><i class="fas fa-moon"></i> Dark Mode</button>
</div>

<div class="main">

<!-- Dashboard -->
<div id="dashboard" class="card section active">
<h2>Dashboard</h2>
<div class="dashboard-stats">
<div class="stat-card stat-xp">XP<br><span id="xp">0</span></div>
<div class="stat-card stat-level">Level<br><span id="level">1</span></div>
<div class="stat-card stat-streak">Streak<br><span id="streak">0</span></div>
</div>
</div>

<!-- Quiz -->
<div id="quiz" class="card section">
<h2>Quiz</h2>
<select id="subjectSelect"></select>
<select id="topicSelect"></select>
<p id="question"></p>
<div id="optionsArea"></div>
</div>

<!-- Timetable -->
<div id="timetable" class="card section">
<input id="days" type="number" placeholder="Days">
<button onclick="generateTimetable()">Generate</button>
<div id="timetableContainer"></div>
</div>

<!-- Analytics -->
<div id="analytics" class="card section">
<canvas id="chart"></canvas>
</div>

<!-- Pomodoro -->
<div id="pomodoro" class="card section">
<p id="timer">25:00</p>
<button onclick="startPomodoro()">Start</button>
</div>

<!-- Mini Game -->
<div id="minigame" class="card section">
<div id="memoryGameContainer"></div>
</div>

<!-- Flashcards -->
<div id="flashcards" class="card section">
<div id="flashcardContainer"></div>
</div>

<!-- Notes -->
<div id="notes" class="card section">
<textarea id="notesArea"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

<!-- Settings -->
<div id="settings" class="card section">
<p>Settings panel</p>
</div>

</div>

<script>

/* Navigation */
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* Dark mode */
function toggleDark(){document.body.classList.toggle('dark');}

/* XP */
let xp=0, streak=0;
function updateXP(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=Math.floor(xp/100)+1;
document.getElementById("streak").innerText=streak;
}

/* Quiz */
const questionBank={
"Maths":{"Algebra":[{q:"2+2?",options:["3","4"],answer:"4"}]},
"Science":{"Cells":[{q:"Nucleus?",options:["Control","Move"],answer:"Control"}]}
};

let sub=document.getElementById("subjectSelect");
let top=document.getElementById("topicSelect");

for(let s in questionBank){let o=document.createElement("option");o.text=s;sub.add(o);}

sub.onchange=()=>{
top.innerHTML="";
for(let t in questionBank[sub.value]){let o=document.createElement("option");o.text=t;top.add(o);}
loadQ();
};

top.onchange=loadQ;

function loadQ(){
let q=questionBank[sub.value][top.value][0];
document.getElementById("question").innerText=q.q;
let area=document.getElementById("optionsArea");area.innerHTML="";
q.options.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>{if(opt==q.answer){xp+=10;streak++;}else{streak=0;}updateXP();};
area.appendChild(b);
});
}
sub.onchange();

/* Timetable */
function generateTimetable(){
let c=document.getElementById("timetableContainer");c.innerHTML="";
for(let i=1;i<=5;i++){
let d=document.createElement("div");
d.innerText="Day "+i;
d.onclick=()=>showSection("quiz");
c.appendChild(d);
}
}

/* Chart */
new Chart(document.getElementById("chart"),{
type:'bar',
data:{labels:["Maths","Science"],datasets:[{data:[xp,xp]}]}
});

/* Pomodoro */
let time=1500;
function startPomodoro(){
setInterval(()=>{
time--;
let m=Math.floor(time/60),s=time%60;
document.getElementById("timer").innerText=m+":"+s.toString().padStart(2,'0');
},1000);
}

/* Memory */
["A","A","B","B"].forEach(c=>{
let d=document.createElement("div");
d.className="memory-card";
d.innerText="?";
d.onclick=()=>d.innerText=c;
document.getElementById("memoryGameContainer").appendChild(d);
});

/* Flashcards */
["Algebra","Cells"].forEach(f=>{
let d=document.createElement("div");
d.className="flashcard";
d.innerText=f;
d.onclick=()=>d.innerText="Answer";
document.getElementById("flashcardContainer").appendChild(d);
});

/* Notes */
function saveNotes(){
localStorage.setItem("notes",document.getElementById("notesArea").value);
}
document.getElementById("notesArea").value=localStorage.getItem("notes")||"";

</script>
</body>
</html>
