<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Pro 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family:'Inter',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:#111;
  transition:0.3s;
}

.dark {
  background:#0f172a;
  color:white;
}

/* Sidebar */
.sidebar {
  position:fixed;
  width:260px;
  height:100%;
  background:rgba(79,124,255,0.9);
  backdrop-filter: blur(12px);
  padding:20px;
  color:white;
}

.sidebar button {
  display:block;
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:transparent;
  color:white;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button.active,
.sidebar button:hover {
  background:rgba(255,255,255,0.2);
}

/* Main */
.main {
  margin-left:280px;
  padding:30px;
}

/* Cards */
.card {
  background:rgba(255,255,255,0.7);
  backdrop-filter: blur(10px);
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fade 0.4s ease;
}

.dark .card {
  background:rgba(31,41,55,0.8);
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#4f7cff;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#2f4fd6;
}

/* Stats */
.dashboard-stats {
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.stat {
  flex:1;
  padding:20px;
  border-radius:15px;
  color:white;
  text-align:center;
  font-weight:bold;
}

.xp {background:linear-gradient(135deg,#4f7cff,#22c55e);}
.level {background:linear-gradient(135deg,#f59e0b,#fde047);}
.streak {background:linear-gradient(135deg,#ef4444,#f97316);}

/* Quiz */
.option-btn {
  display:block;
  margin:8px 0;
  width:100%;
}

/* Memory */
.memory-card {
  display:inline-block;
  width:60px;
  height:60px;
  margin:5px;
  background:#4f7cff;
  color:white;
  text-align:center;
  line-height:60px;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>🎓 GCSE Pro</h2>

<button onclick="showSection('dashboard', this)" class="active">🏠 Dashboard</button>
<button onclick="showSection('quiz', this)">🧠 Quiz</button>
<button onclick="showSection('timetable', this)">📅 Timetable</button>
<button onclick="showSection('analytics', this)">📊 Analytics</button>
<button onclick="showSection('pomodoro', this)">⏱ Pomodoro</button>
<button onclick="showSection('minigame', this)">🎮 Games</button>
<button onclick="showSection('notes', this)">📝 Notes</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<div id="dashboard" class="card section">
<h2>Dashboard</h2>

<div class="dashboard-stats">
  <div class="stat xp">XP<br><span id="xp">0</span></div>
  <div class="stat level">Level<br><span id="level">1</span></div>
  <div class="stat streak">Streak<br><span id="streak">0</span></div>
</div>

</div>

<div id="quiz" class="card section" style="display:none;">
<h2>Quiz</h2>
<select id="subject"></select>
<select id="topic"></select>

<p id="question">Select topic</p>
<div id="options"></div>
</div>

<div id="timetable" class="card section" style="display:none;">
<h2>Timetable</h2>
<input id="days" type="number" placeholder="Days">
<button onclick="generateTimetable()">Generate</button>
<div id="table"></div>
</div>

<div id="analytics" class="card section" style="display:none;">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div id="pomodoro" class="card section" style="display:none;">
<h2>Pomodoro</h2>
<h1 id="timer">25:00</h1>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
</div>

<div id="minigame" class="card section" style="display:none;">
<h2>Memory Game</h2>
<div id="game"></div>
</div>

<div id="notes" class="card section" style="display:none;">
<h2>Notes</h2>
<textarea id="notesArea"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

</div>

<script>

// NAV
function showSection(id, btn){
  document.querySelectorAll('.section').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='block';

  document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle('dark');
}

// XP
let xp=0, streak=0;
function updateStats(){
  document.getElementById("xp").innerText=xp;
  document.getElementById("level").innerText=Math.floor(xp/100)+1;
  document.getElementById("streak").innerText=streak;
}
updateStats();

// QUIZ
const data={
Maths:{Algebra:[{q:"2x=10",a:"5",o:["3","5","6"]}]}
};

const subj=document.getElementById("subject");
const top=document.getElementById("topic");

for(let s in data){
  let opt=new Option(s,s);
  subj.add(opt);
}

subj.onchange=()=>{
  top.innerHTML="";
  for(let t in data[subj.value]){
    top.add(new Option(t,t));
  }
};

top.onchange=loadQ;

function loadQ(){
  let q=data[subj.value][top.value][0];
  document.getElementById("question").innerText=q.q;
  let div=document.getElementById("options");
  div.innerHTML="";
  q.o.forEach(o=>{
    let b=document.createElement("button");
    b.className="option-btn";
    b.innerText=o;
    b.onclick=()=>{
      if(o==q.a){xp+=10; streak++; confetti();}
      else streak=0;
      updateStats();
    };
    div.appendChild(b);
  });
}

// TIMER
let t=1500, int;
function start(){
  if(!int){
    int=setInterval(()=>{
      t--;
      let m=Math.floor(t/60), s=t%60;
      timer.innerText=`${m}:${s}`;
    },1000);
  }
}
function pause(){clearInterval(int); int=null;}

// NOTES
function saveNotes(){
  localStorage.setItem("notes",notesArea.value);
}

notesArea.value=localStorage.getItem("notes")||"";

// GAME
function game(){
  let letters=["A","A","B","B"];
  letters.sort(()=>Math.random()-0.5);
  let first=null;

  letters.forEach(l=>{
    let d=document.createElement("div");
    d.className="memory-card";
    d.innerText="?";
    d.onclick=()=>{
      d.innerText=l;
      if(!first) first=d;
      else{
        if(first.innerText===d.innerText){xp+=20;}
        else setTimeout(()=>{d.innerText="?"; first.innerText="?";},500);
        first=null;
        updateStats();
      }
    };
    gameDiv.appendChild(d);
  });
}

let gameDiv=document.getElementById("game");
game();

</script>

</body>
</html>
