<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate GCSE Revision Pro 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family:'Inter',sans-serif; margin:0; background:linear-gradient(135deg,#eef2ff,#f8fafc); color:#111; transition:0.3s; }
.dark { background:#0f172a; color:white; }
.sidebar { position:fixed; width:260px; height:100%; background:linear-gradient(180deg,#4f7cff,#3561c3); padding:20px; color:white; overflow-y:auto; }
.sidebar button { width:100%; padding:12px; margin:6px 0; border:none; border-radius:10px; background:none; color:white; text-align:left; cursor:pointer; transition:0.2s; }
.sidebar button:hover { background:rgba(255,255,255,0.2); }
.main { margin-left:280px; padding:25px; }
.card { background:white; padding:25px; border-radius:18px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-bottom:20px; transition:0.3s; }
.dark .card { background:#1f2937; }
.stats { display:flex; gap:15px; flex-wrap:wrap; }
.stat { flex:1; padding:20px; border-radius:15px; color:white; text-align:center; font-weight:bold; }
.xp {background:linear-gradient(135deg,#4f7cff,#22c55e);}
.level {background:linear-gradient(135deg,#f59e0b,#fde047);}
.streak {background:linear-gradient(135deg,#ef4444,#f97316);}
.quiz-option { display:block; padding:12px; margin:10px 0; border-radius:10px; border:2px solid #ddd; cursor:pointer; transition:0.2s; }
.quiz-option:hover { border-color:#4f7cff; background:#eef2ff; }
.correct { background:#22c55e; color:white; }
.wrong { background:#ef4444; color:white; }
.day-card { background:linear-gradient(135deg,#4f7cff,#6366f1); color:white; padding:15px; border-radius:15px; margin-bottom:15px; }
.sessions { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
.session { flex:1; min-width:80px; background:white; color:#111; padding:10px; border-radius:10px; text-align:center; font-weight:600; cursor:pointer; transition:0.2s; }
.session:hover { transform:scale(1.05); }
.memory-card { width:70px; height:70px; background:#4f7cff; color:white; display:inline-block; text-align:center; line-height:70px; margin:5px; border-radius:10px; cursor:pointer; }
input, textarea, select, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:none; }
.subject-note { margin-top:15px; }
.subject-note h3 { cursor:pointer; background:#4f7cff; color:white; padding:10px; border-radius:10px; margin:5px 0; }
.subject-note div { display:none; padding:10px; background:#eef2ff; border-radius:10px; margin-bottom:5px; }
.dark .subject-note div { background:#1f2937; }
</style>
</head>
<body>

<div class="sidebar">
  <h2>GCSE Pro</h2>
  <button onclick="show('dashboard')">🏠 Dashboard</button>
  <button onclick="show('quiz')">🧠 Quiz</button>
  <button onclick="show('timetable')">📅 Timetable</button>
  <button onclick="show('pomodoro')">⏱ Pomodoro</button>
  <button onclick="show('game')">🎮 Mini Game</button>
  <button onclick="show('notes')">📝 Notes</button>
  <button onclick="show('subjectNotes')">📚 Subject Notes</button>
  <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<div id="dashboard" class="card section">
  <h2>Dashboard</h2>
  <div class="stats">
    <div class="stat xp">XP<br><span id="xp">0</span></div>
    <div class="stat level">Level<br><span id="level">1</span></div>
    <div class="stat streak">Streak<br><span id="streak">0</span></div>
  </div>
</div>

<div id="quiz" class="card section" style="display:none;">
  <h2>Quiz</h2>
  <select id="subjectSelect"></select>
  <select id="topicSelect"></select>
  <button onclick="startQuiz()">Start Quiz</button>
  <div id="quizArea" style="margin-top:20px;">
    <p id="question"></p>
    <div id="options"></div>
  </div>
</div>

<div id="timetable" class="card section" style="display:none;">
  <h2>Timetable</h2>
  <input id="days" type="number" placeholder="Days to revise">
  <button onclick="generate()">Generate Timetable</button>
  <div id="table"></div>
</div>

<div id="pomodoro" class="card section" style="display:none;">
  <h2>Pomodoro</h2>
  <h1 id="timer">25:00</h1>
  <button onclick="start()">Start</button>
  <button onclick="pause()">Pause</button>
  <button onclick="reset()">Reset</button>
</div>

<div id="game" class="card section" style="display:none;">
  <h2>Memory Game</h2>
  <div id="gameArea"></div>
</div>

<div id="notes" class="card section" style="display:none;">
  <h2>General Notes</h2>
  <textarea id="notesArea" placeholder="Write your notes here..."></textarea>
  <button onclick="saveNotes()">Save</button>
</div>

<div id="subjectNotes" class="card section" style="display:none;">
  <h2>Subject Notes</h2>
  <div id="subjectNotesContainer"></div>
</div>

</div>

<script>
// Navigation
function show(id){ document.querySelectorAll('.section').forEach(s=>s.style.display='none'); document.getElementById(id).style.display='block'; }

// Dark Mode
function toggleDark(){ document.body.classList.toggle('dark'); }

// XP System
let xp=parseInt(localStorage.getItem("xp"))||0;
let streak=parseInt(localStorage.getItem("streak"))||0;
function updateStats(){ document.getElementById("xp").innerText=xp; document.getElementById("level").innerText=Math.floor(xp/100)+1; document.getElementById("streak").innerText=streak; }
updateStats();

// Full GCSE Topic List with 5 placeholder questions each
const questionBank = {
"Biology":{"Cell Level Systems":[],"Scaling Up":[],"Organism Level Systems":[],"Community Level Systems":[],"Genes, Inheritance & Selection":[],"Global Challenges":[]},
"Chemistry":{"Particles":[],"Elements, Compounds & Mixtures":[],"Chemical Reactions":[],"Predicting & Identifying Reactions & Products":[],"Monitoring & Controlling Chemical Reactions":[],"Global Challenges":[]},
"Physics":{"Matter":[],"Forces":[],"Electricity":[],"Magnetism & Magnetic Fields":[],"Waves in Matter":[],"Radioactivity":[],"Energy":[],"Global Challenges":[]},
"Maths":{"Numbers":[],"Algebra":[],"Graphs":[],"Ratio, Proportion & Rates of Change":[],"Geometry & Measures":[],"Pythagoras & Trigonometry":[],"Probability & Statistics":[]},
"Computer Science":{"Systems Architecture":[],"Memory & Storage":[],"Computer Networks, Connections & Protocols":[],"Network Security":[],"Systems Software":[],"Ethical, Legal, Cultural & Environmental Impacts of Digital Technology":[],"Algorithms":[],"Programming Fundamentals":[],"Producing Robust Programs":[],"Boolean Logic":[],"Programming Languages & IDEs":[]},
"Geography":{"The Challenge of Natural Hazards":[],"The Living World":[],"Physical Landscapes in the UK":[],"Urban Issues and Challenges":[],"The Changing Economic World":[],"The Challenge of Resource Management":[]},
"German":{"Identity & Relationships":[],"Healthy Living & Lifestyle":[],"Education & Work":[],"Free Time & Leisure":[],"Customs & Festivals":[],"Home, Town & Local Area":[],"Environment & Global Issues":[],"Travel & Tourism":[],"Present Tense":[],"Past Tense":[],"Future Tense":[],"Modal Verbs":[],"Reflexive Verbs":[],"Cases":[],"Adjective Endings":[],"Reading Skills":[],"Listening Skills":[],"Speaking Skills":[],"Writing Skills":[]},
"English":{"Language Paper 1 – Reading (Fiction)":[],"Language Paper 1 – Writing (Descriptive/Narrative)":[],"Language Paper 2 – Reading (Non-fiction)":[],"Language Paper 2 – Writing (Viewpoints/Perspectives)":[],"Literature Paper 1 – Macbeth":[],"Literature Paper 1 – A Christmas Carol":[],"Literature Paper 2 – An Inspector Calls":[],"Literature Paper 2 – Power & Conflict Poetry":[],"Literature Paper 2 – Unseen Poetry":[],"SPaG":[]},
"Media Studies":{"Media Language":[],"Media Representation":[],"Media Industries":[],"Media Audiences":[],"Newspapers":[],"Magazines":[],"Advertising & Marketing":[],"Film":[],"Television":[],"Online & Social Media":[],"Music Video":[],"Video Games":[],"Component 1 Exam Skills":[],"Component 2 Exam Skills":[]}
};

// Generate placeholder 5 questions per topic
for(let subj in questionBank){
  for(let topic in questionBank[subj]){
    for(let i=1;i<=5;i++){
      questionBank[subj][topic].push({q:`Sample Question ${i} for ${topic}`, o:["Option 1","Option 2","Option 3","Option 4","Option 5"], a:"Option 1"});
    }
  }
}

// Populate subjects/topics
const subjectSelect=document.getElementById("subjectSelect");
const topicSelect=document.getElementById("topicSelect");
function populateSubjects(){ subjectSelect.innerHTML=""; for(let s in questionBank){ subjectSelect.add(new Option(s,s)); } }
function populateTopics(){ topicSelect.innerHTML=""; const subj=subjectSelect.value; for(let t in questionBank[subj]){ topicSelect.add(new Option(t,t)); } }
subjectSelect.onchange=populateTopics;
populateSubjects();
populateTopics();

// Quiz
let currentQuestions=[]; let qIndex=0;
function startQuiz(){ const subj=subjectSelect.value; const top=topicSelect.value; currentQuestions=questionBank[subj][top]; qIndex=0; loadQuestion(); }
function loadQuestion(){
  const qEl=document.getElementById("question"); const opts=document.getElementById("options"); opts.innerHTML="";
  if(qIndex>=currentQuestions.length){ qEl.innerText="✅ Quiz Complete!"; return; }
  const item=currentQuestions[qIndex]; qEl.innerText=item.q;
  item.o.forEach(opt=>{
    const div=document.createElement("div"); div.className="quiz-option"; div.innerText=opt;
    div.onclick=()=>{
      div.classList.add(opt===item.a?"correct":"wrong");
      if(opt===item.a){ xp+=10; streak++; } else { streak=0; }
      updateStats(); localStorage.setItem("xp",xp); localStorage.setItem("streak",streak);
      setTimeout(()=>{ qIndex++; loadQuestion(); },500);
    };
    opts.appendChild(div);
  });
}

// Timetable
function generate(){ const days=parseInt(document.getElementById("days").value); const table=document.getElementById("table"); table.innerHTML=""; const subjects=Object.keys(questionBank);
  for(let i=1;i<=days;i++){ const dayCard=document.createElement("div"); dayCard.className="day-card"; dayCard.innerHTML="<b>Day "+i+"</b>";
    const wrap=document.createElement("div"); wrap.className="sessions";
    for(let j=0;j<3;j++){ const s=document.createElement("div"); s.className="session"; const sub=subjects[Math.floor(Math.random()*subjects.length)]; s.innerText=sub; s.onclick=()=>{ subjectSelect.value=sub; populateTopics(); show('quiz'); }; wrap.appendChild(s); }
    dayCard.appendChild(wrap); table.appendChild(dayCard); }
}

// Pomodoro
let t=1500, interval; function updateTimer(){ const m=Math.floor(t/60), s=t%60; document.getElementById("timer").innerText=`${m}:${s.toString().padStart(2,'0')}`; }
function start(){ if(!interval) interval=setInterval(()=>{ t--; updateTimer(); if(t<=0){ clearInterval(interval); interval=null; alert("Pomodoro Complete!"); t=1500; updateTimer(); } },1000); }
function pause(){ clearInterval(interval); interval=null; }
function reset(){ clearInterval(interval); interval=null; t=1500; updateTimer(); }
updateTimer();

// Memory Game
function game(){ const arr=["A","A","B","B","C","C","D","D"]; arr.sort(()=>Math.random()-0.5); const area=document.getElementById("gameArea"); area.innerHTML=""; let first=null; arr.forEach(val=>{ const card=document.createElement("div"); card.className="memory-card"; card.innerText="?"; card.onclick=()=>{ card.innerText=val; if(!first) first=card; else{ if(first.innerText===card.innerText){ xp+=20; updateStats(); } else { setTimeout(()=>{first.innerText="?"; card.innerText="?"; first=null;},500);} first=null; } }; area.appendChild(card); }); }
game();

// Notes
function saveNotes(){ localStorage.setItem("notes",document.getElementById("notesArea").value); }
document.getElementById("notesArea").value=localStorage.getItem("notes")||"";

// Subject Notes
const subjectNotesContainer=document.getElementById("subjectNotesContainer");
for(let subj in questionBank){
  const div=document.createElement("div"); div.className="subject-note";
  div.innerHTML=`<h3 onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">${subj}</h3>`;
  const inner=document.createElement("div");
  inner.innerHTML=Object.keys(questionBank[subj]).map(t=>`<b>${t}:</b> Sample notes for ${t}.`).join("<br>");
  div.appendChild(inner);
  subjectNotesContainer.appendChild(div);
}
</script>

</body>
</html>
