```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#eef2ff;
--card:white;
--primary:#4f8cff;
--secondary:#6dd5a3;
--text:#222;
}

.dark{
--bg:#0f172a;
--card:#1e293b;
--text:#f1f5f9;
}

body{
font-family:Arial;
background:var(--bg);
margin:0;
padding:25px;
color:var(--text);
transition:0.3s;
}

h1{text-align:center;}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:var(--primary);
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{opacity:0.9}

.card{
background:var(--card);
padding:20px;
margin:15px 0;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.bar{
height:100%;
background:linear-gradient(90deg,var(--primary),var(--secondary));
width:0%;
}

select,input{
padding:8px;
margin:6px 0;
width:100%;
border-radius:6px;
border:1px solid #ccc;
}

#timer{
font-size:28px;
font-weight:bold;
margin:10px 0;
}

</style>
</head>

<body>

<h1>📚 GCSE Revision App</h1>

<button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

<div class="card">

<div>⭐ XP: <span id="xp">0</span></div>
<div>🏆 Level: <span id="level">1</span></div>
<div>🔥 Streak: <span id="streak">0</span></div>

</div>

<div class="card">

<h3>🧠 Quiz Generator</h3>

<select id="subjectSelect" onchange="populateTopics()"></select>
<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<div id="question"></div>

</div>

<div class="card">

<h3>⏱ Pomodoro Timer</h3>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>📈 Progress</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏅 Achievements</h3>
<ul id="badges"></ul>

</div>

<div class="card">

<h3>📅 Revision Timetable</h3>

<input id="days" type="number" placeholder="Days to revise">

<button onclick="generateTimetable()">Generate</button>

<table id="timetable"></table>

</div>

<script>

const subjects={

"Maths (OCR)":{

"Algebra":[
"Solve 3x + 5 = 20",
"Expand 4(x+2)",
"Factorise x²+5x",
"Solve 2x−7=9"
],

"Fractions":[
"Simplify 12/18",
"Add 3/5 + 2/7",
"Multiply 2/3 × 4/5",
"Convert 0.25 to a fraction"
]

},

"Combined Science (AQA)":{

"Cells":[
"What is mitosis?",
"What does the nucleus do?",
"What is diffusion?",
"What do mitochondria do?"
],

"Electricity":[
"What is voltage?",
"What is current?",
"What is resistance?",
"State Ohm's Law"
]

},

"Computer Science (OCR)":{

"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is clock speed?"
],

"Memory":[
"What is RAM?",
"What is ROM?",
"What is cache memory?"
]

},

"Geography (AQA)":{

"Rivers":[
"What is erosion?",
"What is deposition?",
"What is a meander?"
],

"Natural Hazards":[
"What causes earthquakes?",
"What is a tectonic plate?",
"What causes volcanoes?"
]

},

"German (AQA)":{

"Family":[
"Translate: My mother is kind",
"What does 'Bruder' mean?",
"What does 'Schwester' mean?"
],

"School":[
"Translate: I go to school",
"What is 'Lehrer'?",
"What is 'Hausaufgaben'?"
]

},

"English (AQA)":{

"Language":[
"What is a simile?",
"What is a metaphor?",
"What is imagery?"
],

"Creative Writing":[
"Describe a storm",
"Write an opening sentence",
"Describe a mysterious place"
]

},

"Media Studies":{

"Representation":[
"What is representation?",
"What is a stereotype?",
"What is media bias?"
],

"Audience":[
"What is target audience?",
"What is demographics?",
"What is psychographics?"
]

}

};

let xp=parseInt(localStorage.getItem("xp")||0);
let streak=parseInt(localStorage.getItem("streak")||0);

document.getElementById("xp").innerText=xp;
document.getElementById("streak").innerText=streak;

function level(){return Math.floor(xp/100)+1}
document.getElementById("level").innerText=level();

function populateSubjects(){

let s=document.getElementById("subjectSelect");

for(let subject in subjects){

let opt=document.createElement("option");
opt.value=subject;
opt.text=subject;

s.add(opt);

}

populateTopics();

}

function populateTopics(){

let subject=document.getElementById("subjectSelect").value;
let t=document.getElementById("topicSelect");

t.innerHTML="";

for(let topic in subjects[subject]){

let opt=document.createElement("option");
opt.value=topic;
opt.text=topic;

t.add(opt);

}

}

function generateQuestion(){

let subject=document.getElementById("subjectSelect").value;
let topic=document.getElementById("topicSelect").value;

let list=subjects[subject][topic];

let q=list[Math.floor(Math.random()*list.length)];

document.getElementById("question").innerText=q;

gainXP();
updateChart();
checkBadges();

}

function gainXP(){

xp+=10;
localStorage.setItem("xp",xp);

document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level();

}

function toggleDark(){

document.body.classList.toggle("dark");

}

let time=1500;
let timerInterval;

function startTimer(){

timerInterval=setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) clearInterval(timerInterval);

},1000)

}

function resetTimer(){

clearInterval(timerInterval);

time=1500;

document.getElementById("timer").innerText="25:00";

}

const ctx=document.getElementById("chart");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:["Start"],
datasets:[{
label:"XP",
data:[xp]
}]
}
});

function updateChart(){

chart.data.labels.push("Study");
chart.data.datasets[0].data.push(xp);
chart.update();

}

function checkBadges(){

let badges=document.getElementById("badges");

badges.innerHTML="";

if(xp>=50) badges.innerHTML+="<li>⭐ Beginner</li>";
if(xp>=200) badges.innerHTML+="<li>🔥 Consistent Learner</li>";
if(xp>=500) badges.innerHTML+="<li>🏆 Revision Master</li>";

}

function generateTimetable(){

let days=document.getElementById("days").value;
let table=document.getElementById("timetable");

table.innerHTML="";

let list=Object.keys(subjects);

for(let i=1;i<=days;i++){

let subject=list[Math.floor(Math.random()*list.length)];

table.innerHTML+=`<tr><td>Day ${i}</td><td>${subject}</td></tr>`;

}

}

populateSubjects();

</script>

</body>
</html>
```
