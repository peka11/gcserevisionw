<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Pro 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Inter',sans-serif; margin:0; background:#eef2ff; }
.dark { background:#0f172a; color:white; }

.sidebar {
  position:fixed; width:250px; height:100%;
  background:#4f7cff; padding:20px; color:white;
}
.sidebar button {
  width:100%; margin:5px 0; padding:12px;
  border:none; border-radius:8px; background:none;
  color:white; text-align:left; cursor:pointer;
}
.sidebar button:hover { background:rgba(255,255,255,0.2); }

.main { margin-left:270px; padding:25px; }

.card {
  background:white; padding:20px;
  border-radius:15px; margin-bottom:20px;
}
.dark .card { background:#1f2937; }

.memory-card {
  width:60px; height:60px; display:inline-block;
  background:#4f7cff; color:white; line-height:60px;
  text-align:center; margin:5px; border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>GCSE App</h2>
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('quiz')">Quiz</button>
<button onclick="showSection('timetable')">Timetable</button>
<button onclick="showSection('pomodoro')">Pomodoro</button>
<button onclick="showSection('game')">Mini Game</button>
<button onclick="showSection('notes')">Notes</button>
<button onclick="toggleDark()">Dark Mode</button>
</div>

<div class="main">

<div id="dashboard" class="card section">
<h2>Dashboard</h2>
<p>XP: <span id="xp">0</span></p>
<p>Level: <span id="level">1</span></p>
<p>Streak: <span id="streak">0</span></p>
</div>

<div id="quiz" class="card section" style="display:none;">
<h2>Quiz</h2>
<p id="question"></p>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="timetable" class="card section" style="display:none;">
<h2>Timetable</h2>
<input id="days" type="number" placeholder="Days">
<button onclick="generateTimetable()">Generate</button>
<div id="table"></div>
</div>

<div id="pomodoro" class="card section" style="display:none;">
<h2>Pomodoro</h2>
<h1 id="timer">25:00</h1>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<div id="game" class="card section" style="display:none;">
<h2>Memory Game</h2>
<div id="gameArea"></div>
</div>

<div id="notes" class="card section" style="display:none;">
<h2>Notes</h2>
<textarea id="notesArea" style="width:100%;height:150px;"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

</div>

<script>

// NAVIGATION
function showSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// XP SYSTEM
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;

function updateStats(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp/100)+1;
  document.getElementById("streak").innerText = streak;
}
updateStats();

// QUIZ
const questions = [
  {q:"2x + 6 = 10", a:"2", options:["1","2","3"]},
  {q:"Capital of France?", a:"Paris", options:["London","Paris","Rome"]},
  {q:"H2O is?", a:"Water", options:["Oxygen","Hydrogen","Water"]}
];

let qIndex = 0;

function loadQuestion(){
  let q = questions[qIndex];
  document.getElementById("question").innerText = q.q;
  let optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  q.options.forEach(o=>{
    let btn = document.createElement("button");
    btn.innerText = o;
    btn.onclick = ()=>{
      if(o === q.a){
        xp += 10;
        streak++;
        alert("Correct!");
      } else {
        streak = 0;
        alert("Wrong!");
      }
      updateStats();
      localStorage.setItem("xp", xp);
      localStorage.setItem("streak", streak);
    };
    optDiv.appendChild(btn);
  });
}

function nextQuestion(){
  qIndex++;
  if(qIndex >= questions.length){
    alert("Quiz finished!");
    qIndex = 0;
  }
  loadQuestion();
}

loadQuestion();

// TIMETABLE
function generateTimetable(){
  let days = document.getElementById("days").value;
  let table = document.getElementById("table");
  table.innerHTML = "";

  for(let i=1;i<=days;i++){
    let div = document.createElement("div");
    div.innerText = "Day " + i + ": Maths, English, Science";
    table.appendChild(div);
  }
}

// POMODORO
let time = 1500;
let interval;

function updateTimer(){
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
    `${m}:${s.toString().padStart(2,"0")}`;
}

function startTimer(){
  if(!interval){
    interval = setInterval(()=>{
      time--;
      updateTimer();
    },1000);
  }
}

function pauseTimer(){
  clearInterval(interval);
  interval = null;
}

function resetTimer(){
  clearInterval(interval);
  interval = null;
  time = 1500;
  updateTimer();
}

updateTimer();

// MEMORY GAME
function loadGame(){
  let arr = ["A","A","B","B"];
  arr.sort(()=>Math.random()-0.5);

  let area = document.getElementById("gameArea");
  area.innerHTML = "";

  let first = null;

  arr.forEach(val=>{
    let card = document.createElement("div");
    card.className = "memory-card";
    card.innerText = "?";

    card.onclick = ()=>{
      card.innerText = val;

      if(!first){
        first = card;
      } else {
        if(first.innerText === card.innerText){
          xp += 20;
        } else {
          setTimeout(()=>{
            card.innerText = "?";
            first.innerText = "?";
          },500);
        }
        first = null;
        updateStats();
      }
    };

    area.appendChild(card);
  });
}

loadGame();

// NOTES
function saveNotes(){
  localStorage.setItem("notes", document.getElementById("notesArea").value);
}

document.getElementById("notesArea").value =
  localStorage.getItem("notes") || "";

</script>

</body>
</html>
