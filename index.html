<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Pro 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family:'Inter',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:#111;
}

.dark {
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  width:260px;
  height:100%;
  background:linear-gradient(180deg,#4f7cff,#3561c3);
  padding:20px;
  color:white;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover {
  background:rgba(255,255,255,0.2);
}

/* MAIN */
.main {
  margin-left:280px;
  padding:25px;
}

/* CARD */
.card {
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

.dark .card {
  background:#1f2937;
}

/* STATS */
.stats {
  display:flex;
  gap:15px;
}

.stat {
  flex:1;
  padding:20px;
  border-radius:15px;
  color:white;
  text-align:center;
  font-weight:bold;
}

.xp {background:linear-gradient(135deg,#4f7cff,#22c55e);}
.level {background:linear-gradient(135deg,#f59e0b,#fde047);}
.streak {background:linear-gradient(135deg,#ef4444,#f97316);}

/* QUIZ (COGNITO STYLE) */
.quiz-option {
  display:block;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:2px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

.quiz-option:hover {
  border-color:#4f7cff;
  background:#eef2ff;
}

.correct {
  background:#22c55e;
  color:white;
}

.wrong {
  background:#ef4444;
  color:white;
}

/* TIMETABLE */
.day-card {
  background:linear-gradient(135deg,#4f7cff,#6366f1);
  color:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.sessions {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.session {
  flex:1;
  background:white;
  color:#111;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.session:hover {
  transform:scale(1.05);
}

/* MEMORY */
.memory-card {
  width:70px;
  height:70px;
  background:#4f7cff;
  color:white;
  display:inline-block;
  line-height:70px;
  text-align:center;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}

/* INPUT */
input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>GCSE Pro</h2>

<button onclick="show('dashboard')">🏠 Dashboard</button>
<button onclick="show('quiz')">🧠 Quiz</button>
<button onclick="show('timetable')">📅 Timetable</button>
<button onclick="show('pomodoro')">⏱ Pomodoro</button>
<button onclick="show('game')">🎮 Mini Game</button>
<button onclick="show('notes')">📝 Notes</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="card section">
<h2>Dashboard</h2>

<div class="stats">
  <div class="stat xp">XP<br><span id="xp">0</span></div>
  <div class="stat level">Level<br><span id="level">1</span></div>
  <div class="stat streak">Streak<br><span id="streak">0</span></div>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="card section" style="display:none;">
<h2>Quiz</h2>
<p id="question" style="font-weight:bold;"></p>
<div id="options"></div>
<button onclick="nextQ()">Next</button>
</div>

<!-- TIMETABLE -->
<div id="timetable" class="card section" style="display:none;">
<h2>Timetable</h2>
<input id="days" type="number" placeholder="Days to revise">
<button onclick="generate()">Generate</button>
<div id="table"></div>
</div>

<!-- POMODORO -->
<div id="pomodoro" class="card section" style="display:none;">
<h2>Pomodoro</h2>
<h1 id="timer">25:00</h1>
<button onclick="start()">Start</button>
<button onclick="pause()">Pause</button>
<button onclick="reset()">Reset</button>
</div>

<!-- GAME -->
<div id="game" class="card section" style="display:none;">
<h2>Memory Game</h2>
<div id="gameArea"></div>
</div>

<!-- NOTES -->
<div id="notes" class="card section" style="display:none;">
<h2>Notes</h2>
<textarea id="notesArea"></textarea>
<button onclick="saveNotes()">Save</button>
</div>

</div>

<script>

// NAV
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
}

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// XP
let xp = parseInt(localStorage.getItem("xp")) || 0;
let streak = parseInt(localStorage.getItem("streak")) || 0;

function update(){
  xpEl.innerText = xp;
  levelEl.innerText = Math.floor(xp/100)+1;
  streakEl.innerText = streak;
}
const xpEl = document.getElementById("xp");
const levelEl = document.getElementById("level");
const streakEl = document.getElementById("streak");
update();

// QUIZ
const qs = [
{q:"2x+6=10",a:"2",o:["1","2","3"]},
{q:"Capital of Germany?",a:"Berlin",o:["Paris","Berlin","Rome"]},
{q:"CO2 is?",a:"Carbon dioxide",o:["Oxygen","Carbon dioxide","Hydrogen"]}
];

let i=0;

function loadQ(){
  let q=qs[i];
  question.innerText=q.q;
  options.innerHTML="";

  q.o.forEach(opt=>{
    let div=document.createElement("div");
    div.className="quiz-option";
    div.innerText=opt;

    div.onclick=()=>{
      if(opt===q.a){
        div.classList.add("correct");
        xp+=10; streak++;
      } else {
        div.classList.add("wrong");
        streak=0;
      }
      update();
      localStorage.setItem("xp",xp);
      localStorage.setItem("streak",streak);
    };

    options.appendChild(div);
  });
}

function nextQ(){
  i++;
  if(i>=qs.length){alert("Finished!"); i=0;}
  loadQ();
}

loadQ();

// TIMETABLE
function generate(){
  let d=document.getElementById("days").value;
  let table=document.getElementById("table");
  table.innerHTML="";

  const subjects=["Maths","Science","English","Geography"];

  for(let i=1;i<=d;i++){
    let day=document.createElement("div");
    day.className="day-card";
    day.innerHTML="<b>Day "+i+"</b>";

    let sessionWrap=document.createElement("div");
    sessionWrap.className="sessions";

    for(let j=0;j<3;j++){
      let subj=subjects[Math.floor(Math.random()*subjects.length)];
      let s=document.createElement("div");
      s.className="session";
      s.innerText=subj;

      s.onclick=()=>{
        show("quiz");
      };

      sessionWrap.appendChild(s);
    }

    day.appendChild(sessionWrap);
    table.appendChild(day);
  }
}

// TIMER
let t=1500, int;

function updateTimer(){
  let m=Math.floor(t/60);
  let s=t%60;
  timer.innerText=`${m}:${s.toString().padStart(2,'0')}`;
}

function start(){
  if(!int){
    int=setInterval(()=>{
      t--;
      updateTimer();
    },1000);
  }
}

function pause(){clearInterval(int); int=null;}
function reset(){clearInterval(int); int=null; t=1500; updateTimer();}

updateTimer();

// GAME
function game(){
  let arr=["A","A","B","B"];
  arr.sort(()=>Math.random()-0.5);
  gameArea.innerHTML="";
  let first=null;

  arr.forEach(val=>{
    let c=document.createElement("div");
    c.className="memory-card";
    c.innerText="?";

    c.onclick=()=>{
      c.innerText=val;
      if(!first) first=c;
      else{
        if(first.innerText===c.innerText){xp+=20;}
        else setTimeout(()=>{
          c.innerText="?";
          first.innerText="?";
        },500);
        first=null;
        update();
      }
    };

    gameArea.appendChild(c);
  });
}
game();

// NOTES
function saveNotes(){
  localStorage.setItem("notes",notesArea.value);
}
notesArea.value=localStorage.getItem("notes")||"";

</script>

</body>
</html>
