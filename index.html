<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate GCSE Revision App 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
padding:0;
background:#f0f4f8;
color:#1f2937;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:260px;
background:linear-gradient(180deg,#4f7cff,#3561c3);
padding:20px;
display:flex;
flex-direction:column;
color:white;
box-shadow:4px 0 20px rgba(0,0,0,0.15);
}

.sidebar h2{
margin-top:0;
margin-bottom:20px;
}

.sidebar button{
background:none;
border:none;
color:white;
text-align:left;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.sidebar button:hover{
background:rgba(255,255,255,0.25);
}

.main{
margin-left:280px;
padding:25px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.dark .card{
background:#1f2937;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#4f7cff;
color:white;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

button:hover{
background:#2f4fd6;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.progress-bar{
height:24px;
width:100%;
background:#ddd;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#4f7cff,#34c759);
text-align:center;
color:white;
line-height:24px;
font-weight:bold;
}

td,th{
padding:10px;
text-align:center;
}

th{
background:#4f7cff;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>GCSE App</h2>

<button onclick="showSection('dashboard')">🏠 Dashboard</button>
<button onclick="showSection('quiz')">🧠 Quiz</button>
<button onclick="showSection('timetable')">📅 Timetable</button>
<button onclick="showSection('analytics')">📊 Analytics</button>
<button onclick="showSection('pomodoro')">⏱ Pomodoro</button>
<button onclick="showSection('minigame')">🎮 Mini Game</button>
<button onclick="showSection('settings')">⚙️ Settings</button>
<button id="darkBtn">🌙 Dark Mode</button>

</div>

<div class="main">

<div id="dashboard" class="card section">
<h2>Dashboard</h2>
<p>XP: <span id="xp">0</span></p>
<p>Level: <span id="level">1</span></p>

<div class="progress-bar">
<div class="progress-fill" id="overallProgress">0%</div>
</div>

</div>

<div id="quiz" class="card section" style="display:none;">
<h2>Quiz</h2>

<select id="subjectSelect"></select>
<select id="topicSelect"></select>

<p id="question" style="margin-top:20px;font-weight:bold;font-size:18px;"></p>
<button id="nextBtn">Next</button>

</div>

<div id="timetable" class="card section" style="display:none;">
<h2>Revision Timetable</h2>

<input id="days" type="number" placeholder="Days to revise">

<button onclick="generateTimetable()">Generate Timetable</button>

<div id="timetableContainer"></div>

</div>

<div id="analytics" class="card section" style="display:none;">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

<div id="pomodoro" class="card section" style="display:none;">
<h2>Pomodoro Timer</h2>

<p id="timer">25:00</p>

<button onclick="startPomodoro()">Start</button>
<button onclick="pausePomodoro()">Pause</button>
<button onclick="resetPomodoro()">Reset</button>

</div>

<div id="minigame" class="card section" style="display:none;">
<h2>Mini Game</h2>
<div id="memoryGameContainer"></div>
</div>

<div id="settings" class="card section" style="display:none;">
<h2>Settings</h2>
<p>Use the sidebar button to toggle dark mode.</p>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

let xp=0

function updateXP(){
document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=Math.floor(xp/100)+1
document.getElementById("overallProgress").style.width=Math.min(xp,100)+"%"
document.getElementById("overallProgress").innerText=Math.min(xp,100)+"%"
}

const questionBank={

"Maths":{
"Algebra":[
"Solve 2x+5=15",
"Solve 3x-7=11",
"Factorise x²+5x+6",
"Simplify 3(x+2)-4x",
"Expand (x+4)(x+3)"
],

"Trigonometry":[
"Find sin(30°)",
"Find cos(60°)",
"Find tan(45°)",
"Use Pythagoras theorem",
"What is sin²θ+cos²θ?"
]
},

"Science":{
"Atomic Structure":[
"What is a proton?",
"What is a neutron?",
"What is an electron?",
"What is atomic number?",
"What is an isotope?"
]
}

}

const subjectSelect=document.getElementById("subjectSelect")
const topicSelect=document.getElementById("topicSelect")

for(let subject in questionBank){
let opt=document.createElement("option")
opt.value=subject
opt.textContent=subject
subjectSelect.appendChild(opt)
}

function updateTopics(){
topicSelect.innerHTML=""
let subj=subjectSelect.value

for(let topic in questionBank[subj]){
let opt=document.createElement("option")
opt.value=topic
opt.textContent=topic
topicSelect.appendChild(opt)
}
}

subjectSelect.addEventListener("change",()=>{
updateTopics()
loadQuiz()
})

updateTopics()

let currentQuestions=[]
let currentIndex=0

function loadQuiz(){
let subj=subjectSelect.value
let topic=topicSelect.value
currentQuestions=[...questionBank[subj][topic]].sort(()=>Math.random()-0.5)
currentIndex=0
showQuestion()
}

function showQuestion(){

if(currentIndex>=currentQuestions.length){
document.getElementById("question").innerText="Quiz Complete!"
return
}

document.getElementById("question").innerText=currentQuestions[currentIndex]

}

document.getElementById("nextBtn").onclick=()=>{
xp+=10
updateXP()
currentIndex++
showQuestion()
}

topicSelect.addEventListener("change",loadQuiz)

loadQuiz()

function generateTimetable(){

const days=parseInt(document.getElementById("days").value)

const container=document.getElementById("timetableContainer")

container.innerHTML=""

let subjects=Object.keys(questionBank)

let table="<table border='1'><tr><th>Day</th><th>Subject</th></tr>"

for(let i=1;i<=days;i++){

let subj=subjects[Math.floor(Math.random()*subjects.length)]

table+=`<tr><td>${i}</td><td>${subj}</td></tr>`

}

table+="</table>"

container.innerHTML=table

}

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:"bar",
data:{
labels:["Maths","Science"],
datasets:[{
data:[10,10],
backgroundColor:["#4f7cff","#34c759"]
}]
}
})

let pomodoro=1500
let interval=null

function updateTimer(){

let m=Math.floor(pomodoro/60)
let s=pomodoro%60

document.getElementById("timer").innerText=
m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")

}

function startPomodoro(){

if(interval)return

interval=setInterval(()=>{

pomodoro--
updateTimer()

if(pomodoro<=0){
clearInterval(interval)
interval=null
alert("Session Complete")
}

},1000)

}

function pausePomodoro(){
clearInterval(interval)
interval=null
}

function resetPomodoro(){

pomodoro=1500
updateTimer()

clearInterval(interval)
interval=null

}

updateTimer()

document.getElementById("darkBtn").onclick=()=>{
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
