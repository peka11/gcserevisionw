<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/7a3c1e6b3c.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: linear-gradient(135deg,#4f7cff,#6dd5ed);
  color:white;
}

/* Sidebar */
.sidebar {
  position:fixed;
  width:260px;
  height:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:20px;
}
.sidebar button {
  width:100%;
  background:none;
  border:none;
  color:white;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  gap:10px;
}
.sidebar button:hover { background:rgba(255,255,255,0.2); }

/* Main */
.main { margin-left:280px; padding:30px; }

/* Cards */
.card {
  background:rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

/* Sections */
.section { display:none; }
.active { display:block; }

/* Stats */
.stats { display:flex; gap:15px; }
.stat { flex:1; padding:20px; border-radius:15px; text-align:center; }
.xp { background:linear-gradient(#34c759,#4f7cff); }
.level { background:linear-gradient(#ffcc00,#ff9500); }
.streak { background:linear-gradient(#ff3b30,#ff2d55); }

/* Buttons */
button { padding:10px; border:none; border-radius:10px; cursor:pointer; }

/* Memory */
.memory { width:60px; height:60px; background:#4f7cff; display:inline-flex; align-items:center; justify-content:center; margin:5px; cursor:pointer; border-radius:10px; }

/* Flashcards */
.flash { width:150px; height:100px; background:#4f7cff; display:inline-flex; align-items:center; justify-content:center; margin:5px; cursor:pointer; border-radius:10px; }
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('dashboard')"><i class="fas fa-home"></i> Dashboard</button>
<button onclick="show('quiz')"><i class="fas fa-brain"></i> Quiz</button>
<button onclick="show('timetable')"><i class="fas fa-calendar"></i> Timetable</button>
<button onclick="show('analytics')"><i class="fas fa-chart-bar"></i> Analytics</button>
<button onclick="show('pomodoro')"><i class="fas fa-clock"></i> Pomodoro</button>
<button onclick="show('games')"><i class="fas fa-gamepad"></i> Games</button>
<button onclick="show('flashcards')"><i class="fas fa-layer-group"></i> Flashcards</button>
<button onclick="show('notes')"><i class="fas fa-sticky-note"></i> Notes</button>
</div>

<div class="main">

<!-- Dashboard -->
<div id="dashboard" class="card section active">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat xp">XP<br><span id="xp">0</span></div>
<div class="stat level">Level<br><span id="level">1</span></div>
<div class="stat streak">Streak<br><span id="streak">0</span></div>
</div>
</div>

<!-- Quiz -->
<div id="quiz" class="card section">
<h2>Quiz</h2>
<select id="subject"></select>
<select id="topic"></select>
<p id="q"></p>
<div id="opts"></div>
</div>

<!-- Timetable -->
<div id="timetable" class="card section">
<button onclick="gen()">Generate Timetable</button>
<div id="tt"></div>
</div>

<!-- Analytics -->
<div id="analytics" class="card section">
<canvas id="chart"></canvas>
</div>

<!-- Pomodoro -->
<div id="pomodoro" class="card section">
<p id="time">25:00</p>
<button onclick="start()">Start</button>
</div>

<!-- Games -->
<div id="games" class="card section">
<div id="game"></div>
</div>

<!-- Flashcards -->
<div id="flashcards" class="card section">
<div id="flash"></div>
</div>

<!-- Notes -->
<div id="notes" class="card section">
<textarea id="note"></textarea>
<button onclick="save()">Save</button>
</div>

</div>

<script>

/* NAV */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* XP */
let xp=0, streak=0;
function update(){document.getElementById("xp").innerText=xp;document.getElementById("level").innerText=Math.floor(xp/100)+1;document.getElementById("streak").innerText=streak;}

/* QUIZ */
const data={
Maths:{Algebra:[{q:"2+2?",o:["3","4"],a:"4"}]},
Science:{Cells:[{q:"Nucleus?",o:["Control","Move"],a:"Control"}]}
};
let s=document.getElementById("subject"), t=document.getElementById("topic");
for(let sub in data){let o=document.createElement("option");o.text=sub;s.add(o);}
s.onchange=()=>{t.innerHTML="";for(let top in data[s.value]){let o=document.createElement("option");o.text=top;t.add(o);}load();}
t.onchange=load;
function load(){
let q=data[s.value][t.value][0];
document.getElementById("q").innerText=q.q;
let opts=document.getElementById("opts");opts.innerHTML="";
q.o.forEach(opt=>{
let b=document.createElement("button");
b.innerText=opt;
b.onclick=()=>{if(opt==q.a){xp+=10;streak++;}else{streak=0;}update();};
opts.appendChild(b);
});
}
s.onchange();

/* TIMETABLE */
function gen(){
let tt=document.getElementById("tt");tt.innerHTML="";
for(let i=1;i<=5;i++){
let d=document.createElement("div");
d.innerText="Day "+i;
d.onclick=()=>show("quiz");
tt.appendChild(d);
}
}

/* CHART */
new Chart(document.getElementById("chart"),{type:'bar',data:{labels:["Maths","Science"],datasets:[{data:[xp,xp]}]}});

/* POMODORO */
let time=1500;
function start(){setInterval(()=>{time--;let m=Math.floor(time/60),s=time%60;document.getElementById("time").innerText=m+":"+s.toString().padStart(2,'0');},1000);}

/* GAME */
let cards=["A","A","B","B"];cards.sort(()=>Math.random()-0.5);
cards.forEach(c=>{
let d=document.createElement("div");d.className="memory";d.innerText="?";
d.onclick=()=>d.innerText=c;
document.getElementById("game").appendChild(d);
});

/* FLASHCARDS */
["Algebra","Cells"].forEach(f=>{
let d=document.createElement("div");d.className="flash";d.innerText=f;
d.onclick=()=>d.innerText="Answer";
document.getElementById("flash").appendChild(d);
});

/* NOTES */
function save(){localStorage.setItem("n",document.getElementById("note").value);}
document.getElementById("note").value=localStorage.getItem("n")||"";

</script>

</body>
</html>
