<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Tracker</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        margin: 0;
        padding: 0;
    }
    header {
        background-color: #4a90e2;
        color: white;
        text-align: center;
        padding: 20px 0;
        font-size: 1.8em;
    }
    .container {
        max-width: 1000px;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
        color: #333;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    th, td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }
    th {
        background-color: #f4f6f8;
    }
    tr:hover {
        background-color: #f1f7ff;
    }
    input[type="checkbox"] {
        transform: scale(1.3);
        cursor: pointer;
    }
    .quiz-section {
        margin-top: 30px;
    }
    button {
        background-color: #4a90e2;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 1em;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover {
        background-color: #357ABD;
    }
    .question {
        margin: 15px 0;
        font-weight: bold;
    }
    .answer {
        margin: 5px 0 15px 0;
    }
</style>
</head>
<body>

<header>GCSE Revision Tracker</header>

<div class="container">
    <h2>Topic Progress</h2>
    <table id="topicsTable">
        <tr>
            <th>Topic</th>
            <th>Completed</th>
        </tr>
    </table>

    <h2 class="quiz-section">Quiz</h2>
    <div id="quizContainer"></div>
    <button onclick="generateQuiz()">Start New Quiz</button>
</div>

<script>
    // --- List of topics ---
    const topics = [
        "C1 - Atomic structure",
        "C1 - Periodic table",
        "C1 - Bonding",
        "C1 - Quantitative chemistry",
        "C2 - Rates of reaction",
        "C2 - Energy changes",
        "C2 - Chemical analysis",
        "C2 - Organic chemistry basics",
        "C3 - The atmosphere",
        "C3 - Using resources",
        // Add more topics as needed
    ];

    // --- Populate topics table ---
    const topicsTable = document.getElementById('topicsTable');
    topics.forEach(topic => {
        let row = topicsTable.insertRow();
        let cell1 = row.insertCell(0);
        let cell2 = row.insertCell(1);
        cell1.textContent = topic;
        let checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.onchange = () => {
            localStorage.setItem(topic, checkbox.checked);
        };
        // Load saved state
        checkbox.checked = localStorage.getItem(topic) === 'true';
        cell2.appendChild(checkbox);
    });

    // --- Question Bank (Expanded Example) ---
    const questionBank = [
        {q: "What is the charge of a proton?", a: "Positive"},
        {q: "What is the formula for water?", a: "H2O"},
        {q: "Name one type of chemical bond.", a: "Covalent"},
        {q: "What is the atomic number?", a: "Number of protons"},
        {q: "What is the pH of a neutral solution?", a: "7"},
        {q: "What is the relative formula mass of CO2?", a: "44"},
        {q: "Define exothermic reaction.", a: "Releases energy"},
        {q: "Define endothermic reaction.", a: "Absorbs energy"},
        {q: "State the law of conservation of mass.", a: "Mass is neither created nor destroyed"},
        {q: "What is the main gas in the Earth's atmosphere?", a: "Nitrogen"},
        // You can expand this to 500+ questions later
    ];

    function generateQuiz() {
        const quizContainer = document.getElementById('quizContainer');
        quizContainer.innerHTML = ""; // Clear previous quiz

        // Randomly pick 5 questions
        let shuffled = questionBank.sort(() => 0.5 - Math.random());
        let selected = shuffled.slice(0, 5);

        selected.forEach((item, index) => {
            let div = document.createElement('div');
            div.className = 'question-block';
            div.innerHTML = `
                <div class="question">${index + 1}. ${item.q}</div>
                <input type="text" class="answer" placeholder="Your answer here" />
                <button onclick="checkAnswer(this, '${item.a}')">Check Answer</button>
                <div class="feedback"></div>
            `;
            quizContainer.appendChild(div);
        });
    }

    function checkAnswer(btn, correctAnswer) {
        let input = btn.previousElementSibling;
        let feedback = btn.nextElementSibling;
        if (input.value.trim().toLowerCase() === correctAnswer.toLowerCase()) {
            feedback.textContent = "✅ Correct!";
            feedback.style.color = "green";
        } else {
            feedback.textContent = `❌ Wrong! Correct answer: ${correctAnswer}`;
            feedback.style.color = "red";
        }
    }
</script>

</body>
</html>
