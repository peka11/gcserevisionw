<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate GCSE Revision App 🎓</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
body { font-family:'Inter',sans-serif; margin:0; padding:0; background:#f0f4f8; color:#1f2937; transition:0.3s; }
.dark { background:#0f172a; color:white; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:260px; background:linear-gradient(180deg,#4f7cff,#3561c3); padding:20px; color:white; display:flex; flex-direction:column; }
.sidebar h2 { margin-top:0; margin-bottom:20px; }
.sidebar button { background:none; border:none; color:white; text-align:left; padding:12px; margin-bottom:8px; border-radius:8px; cursor:pointer; font-weight:600; transition:0.2s; }
.sidebar button:hover { background:rgba(255,255,255,0.2); }
.main { margin-left:280px; padding:25px; transition:0.3s; }
.card { background:white; padding:25px; border-radius:18px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-bottom:20px; min-height:200px; transition:0.3s; }
.dark .card { background:#1f2937; }
button { padding:10px 16px; border:none; border-radius:8px; background:#4f7cff; color:white; cursor:pointer; transition:0.2s; }
button:hover { background:#2f4fd6; }
input, select { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
.section { display:none; }
.memory-card { display:inline-block; width:60px; height:60px; background:#4f7cff; color:white; line-height:60px; margin:5px; text-align:center; border-radius:10px; font-weight:bold; font-size:22px; cursor:pointer; transition:0.3s; }
.memory-card:hover { transform:scale(1.05); }
.progress-bar { height:24px; width:100%; background:#ddd; border-radius:12px; overflow:hidden; margin-top:10px; }
.progress-fill { height:100%; width:0%; background: linear-gradient(90deg,#4f7cff,#34c759); text-align:center; color:white; line-height:24px; font-weight:bold; transition:width 0.5s; }
.timetable-day { display:flex; justify-content:space-between; margin-bottom:15px; }
.session-card { flex:1; background:#4f7cff; color:white; padding:15px; border-radius:12px; margin:0 5px; cursor:pointer; text-align:center; font-weight:600; transition:0.3s; }
.session-card:hover { transform:scale(1.03); box-shadow:0 5px 15px rgba(0,0,0,0.2); }
@media(max-width:700px){ .timetable-day { flex-direction:column; } .session-card{ margin:5px 0; } }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="sidebar">
<h2>GCSE App</h2>
<button onclick="showSection('dashboard')">🏠 Dashboard</button>
<button onclick="showSection('quiz')">🧠 Quiz</button>
<button onclick="showSection('timetable')">📅 Timetable</button>
<button onclick="showSection('analytics')">📊 Analytics</button>
<button onclick="showSection('pomodoro')">⏱ Pomodoro</button>
<button onclick="showSection('minigame')">🎮 Mini Game</button>
<button onclick="showSection('settings')">⚙️ Settings</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="card section" style="display:block;">
<h2>Welcome Back! 🎓</h2>
<div style="display:flex; flex-wrap:wrap; gap:20px; margin-top:20px;">
  <div style="flex:1; min-width:180px; background:linear-gradient(135deg,#4f7cff,#34c759); color:white; padding:20px; border-radius:18px; box-shadow:0 8px 20px rgba(0,0,0,0.2); text-align:center; transition:0.3s;">
    <h3>XP</h3>
    <p style="font-size:24px; font-weight:bold;" id="xp">0</p>
  </div>
  <div style="flex:1; min-width:180px; background:linear-gradient(135deg,#ff9500,#ffcc00); color:white; padding:20px; border-radius:18px; box-shadow:0 8px 20px rgba(0,0,0,0.2); text-align:center; transition:0.3s;">
    <h3>Level</h3>
    <p style="font-size:24px; font-weight:bold;" id="level">1</p>
  </div>
  <div style="flex:1; min-width:180px; background:linear-gradient(135deg,#ff2d55,#ff3b30); color:white; padding:20px; border-radius:18px; box-shadow:0 8px 20px rgba(0,0,0,0.2); text-align:center; transition:0.3s;">
    <h3>Streak</h3>
    <p style="font-size:24px; font-weight:bold;" id="streak">0</p>
  </div>
</div>

<div style="margin-top:25px; padding:20px; border-radius:18px; background:#f0f4f8; box-shadow:0 8px 25px rgba(0,0,0,0.1);">
<h3>Badges 🏅</h3>
<div id="badges" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; font-weight:bold; color:#1f2937;">None</div>
</div>

<div style="margin-top:25px; padding:20px; border-radius:18px; background:#fff; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
<h3>Overall Progress 📊</h3>
<div class="progress-bar" style="margin-top:10px;">
  <div class="progress-fill" id="overallProgress">0%</div>
</div>
</div>

<div style="margin-top:25px;">
<h3>Quick Start</h3>
<div style="display:flex; flex-wrap:wrap; gap:15px; margin-top:10px;">
  <button onclick="showSection('quiz')">Take a Quiz 🧠</button>
  <button onclick="showSection('timetable')">View Timetable 📅</button>
  <button onclick="showSection('pomodoro')">Pomodoro Timer ⏱</button>
  <button onclick="showSection('minigame')">Memory Game 🎮</button>
</div>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" class="card section">
<h2>Quiz</h2>
<select id="subjectSelect"></select>
<select id="topicSelect"></select>
<p id="question" style="margin-top:20px;font-weight:bold;">Select a subject and topic.</p>
<button id="nextBtn">Next</button>
</div>

<!-- TIMETABLE -->
<div id="timetable" class="card section">
<h2>Revision Timetable</h2>
<input id="days" type="number" placeholder="Days to revise">
<button id="generateTimetableBtn">Generate Timetable</button>
<div id="timetableContainer" style="margin-top:15px;"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="card section">
<h2>Analytics</h2>
<canvas id="chart" width="400" height="200"></canvas>
</div>

<!-- POMODORO -->
<div id="pomodoro" class="card section">
<h2>Pomodoro Timer</h2>
<p id="timer">25:00</p>
<button id="startPomodoro">Start</button>
<button id="pausePomodoro">Pause</button>
<button id="resetPomodoro">Reset</button>
</div>

<!-- MINI GAME -->
<div id="minigame" class="card section">
<h2>Memory Game</h2>
<div id="memoryGameContainer"></div>
</div>

<!-- SETTINGS -->
<div id="settings" class="card section">
<h2>Settings</h2>
<p>Use the sidebar to toggle dark/light mode and navigate.</p>
</div>

<script>
// --- Section Navigation ---
function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

// --- Dark Mode ---
function toggleDark(){document.body.classList.toggle('dark');}

// --- Expanded Question Bank ---
const questionBank = {
"Maths (OCR)":{"Algebra":["Solve 2x+5=15","Factorise x²+5x+6","Simplify 3(x+2)-4x","Expand (x+3)(x+4)","Solve x²-9=0","Solve x²+6x+8=0","Simplify 2(x-1)+3(x+4)","Find nth term: 3,7,11,15","Solve x+y=5, x-y=1","Solve 2x+3y=12, x-y=1"],"Trigonometry":["Calculate sin(30°)","Find missing angle in right triangle","Use cos rule to find side","Use sin rule to find side","Calculate tan(45°)","Find height using trig","Find angle using sin⁻¹(0.5)","Find angle using cos⁻¹(0.6)","Use Pythagoras to find side","Solve triangle with sides 5,7,8"]},
"Combined Science (AQA Gateway)":{"Cell Biology":["Function of nucleus","Define osmosis","Prokaryotic vs eukaryotic cells","Function of mitochondria","Function of ribosomes","What is a chloroplast?","Describe diffusion","Plant vs animal cells","What is differentiation?","Function of cell membrane"],"Atomic Structure":["Define proton, neutron, electron","Atomic number?","Isotope?","What is a molecule?","Explain relative atomic mass","Electron arrangement","What is a compound?","Explain ionic bonding","Explain covalent bonding","Describe nucleus"]},
"Computer Science (OCR)":{"Programming":["Define variable","Write a for loop","Explain if statements","What is a function?","Difference between int and string","Explain while loop","What is a list/array?","Explain debugging","What is Boolean?","Write program to add two numbers"],"Algorithms":["What is a sorting algorithm?","Binary search","Linear vs binary search","Explain bubble sort","Explain merge sort","Explain insertion sort","What is a flowchart?","What is pseudocode?","What is recursion?","Explain complexity O(n) vs O(log n"]},
"Geography (AQA)":{"Rivers":["Define erosion","What is deposition?","River formation stages","Hydraulic action","Explain attrition","Explain solution","Describe meanders","What is floodplain?","Causes of flooding","Effects of flooding"],"Coasts":["Longshore drift?","Coastal erosion","Headland and bay formation","Explain weathering","Cliffs and wave-cut platforms","Define sediment cell","Causes of coastal flooding","Effects of coastal erosion","Soft/hard engineering","Advantages/disadvantages of groynes"]},
"German (AQA)":{"Family":["Translate: My brother is tall","Conjugate 'haben' for ich, du, er","What is 'Schwester'?","Translate: I have younger sister","Translate: My parents are strict","Conjugate 'sein' for ich, du, er","Translate: Grandparents live in Berlin","I get on well with brother","What is 'Onkel'?","What is 'Tante'?"],"School":["Translate: I have maths on Monday","What is 'Lehrer'?","Conjugate 'sein' for wir","Translate: Favourite subject is history","Translate: I dislike science","What is 'Schule'?","Translate: Timetable is busy","Translate: Lessons from 8-3","What is 'Klassenzimmer'?","Translate: I need pen"]},
"English (AQA)":{"Language Paper 1":["What is a simile?","Identify main idea","Explain tone in paragraph","Identify figurative language","Find purpose of text","What is a metaphor?","Identify perspective","Explain effect on reader","Find word connotations","Explain sentence structure impact"],"Creative Writing":["Write opening paragraph","Use dialogue","Include rhetorical question","Describe setting vividly","Show don't tell","Use cliffhanger","Create tension","Use first-person","Use sensory details","Write strong ending"]},
"Media Studies":{"Representation":["Define media representation","Example of stereotype","Explain target audience","What is gender representation?","What is racial representation?","How is class represented?","Explain media framing","What is bias?","Youth representation?","Women representation?"],"Industry":["Define media industry","Name 2 UK media companies","Explain media regulation","What is convergence?","Horizontal integration","Vertical integration","Public service media?","Commercial media?","Digital media effect?","Copyright law?"]}};

// --- Subject Colors ---
const subjectColors={"Maths (OCR)":"#4f7cff","Combined Science (AQA Gateway)":"#34c759","Computer Science (OCR)":"#ff9500","Geography (AQA)":"#ff2d55","German (AQA)":"#5856d6","English (AQA)":"#ffcc00","Media Studies":"#ff3b30"};

// --- XP / Badges ---
let xp=parseInt(localStorage.getItem("xp")||0);
let streak=parseInt(localStorage.getItem("streak")||0);
let badges=JSON.parse(localStorage.getItem("badges")||"[]");
function updateXP(){
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=Math.floor(xp/100)+1;
document.getElementById("streak").innerText=streak;
document.getElementById("badges").innerText=badges.length>0?badges.join(", "):"None";
let pct=Math.min(Math.floor(xp/12),100);
document.getElementById("overallProgress").style.width=pct+"%";
document.getElementById("overallProgress").innerText=pct+"%";
}
updateXP();

// --- Quiz ---
const subjectSelect=document.getElementById("subjectSelect");
const topicSelect=document.getElementById("topicSelect");
for(let s in questionBank){ let opt=document.createElement("option"); opt.value=s; opt.textContent=s; subjectSelect.appendChild(opt);}
function updateTopics(){ topicSelect.innerHTML=""; let s=subjectSelect.value; for(let t in questionBank[s]){ let opt=document.createElement("option"); opt.value=t; opt.textContent=t; topicSelect.appendChild(opt);} }
subjectSelect.addEventListener("change",()=>{updateTopics(); loadQuiz();});
updateTopics();

let currentQuestions=[]; let currentIndex=0;
function loadQuiz(){ let s=subjectSelect.value, t=topicSelect.value; currentQuestions=[...questionBank[s][t]]; currentIndex=0; showQuestion(); }
function showQuestion(){ const qEl=document.getElementById("question"); const btn=document.getElementById("nextBtn"); if(currentIndex>=currentQuestions.length){ qEl.innerText="✅ Quiz Complete!"; btn.style.display="none"; return;} qEl.innerText=currentQuestions[currentIndex]; btn.style.display="inline-block";}
document.getElementById("nextBtn").addEventListener("click",()=>{
currentIndex++; xp+=10; streak+=1; triggerConfetti();
if(currentIndex===currentQuestions.length){badges.push("Completed: "+topicSelect.value); triggerConfetti();}
updateXP(); localStorage.setItem("xp",xp); localStorage.setItem("streak",streak); localStorage.setItem("badges",JSON.stringify(badges));
showQuestion();
});
topicSelect.addEventListener("change",loadQuiz);
loadQuiz();

function triggerConfetti(){ confetti({particleCount:150,spread:70,origin:{y:0.6}}); }

// --- Timetable ---
document.getElementById("generateTimetableBtn").addEventListener("click",()=>{
const days=parseInt(document.getElementById("days").value);
if(!days||days<=0){alert("Enter valid number of days"); return;}
const container=document.getElementById("timetableContainer"); container.innerHTML="";
const subjectsList=Object.keys(questionBank);
for(let i=1;i<=days;i++){
const dayDiv=document.createElement("div"); dayDiv.className="timetable-day";
const dayLabel=document.createElement("div"); dayLabel.style.fontWeight="600"; dayLabel.style.marginRight="10px"; dayLabel.innerText="Day "+i;
dayDiv.appendChild(dayLabel);
subjectsList.forEach(subj=>{
let topics=Object.keys(questionBank[subj]);
let topic=topics[Math.floor(Math.random()*topics.length)];
const session=document.createElement("div");
session.className="session-card"; session.innerText=subj+": "+topic; session.style.backgroundColor=subjectColors[subj]||"#888";
session.addEventListener("click",()=>{subjectSelect.value=subj; updateTopics(); topicSelect.value=topic; loadQuiz(); showSection("quiz");});
dayDiv.appendChild(session);
});
container.appendChild(dayDiv);
}
});

// --- Analytics ---
const ctx=document
