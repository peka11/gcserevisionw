```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef3ff;
margin:0;
padding:25px;
}

.dark{
background:#111;
color:white;
}

h1{text-align:center;}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#4f8cff;
color:white;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.dark .card{
background:#222;
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
margin:10px 0;
}

.progress div{
height:100%;
background:#4f8cff;
width:0%;
border-radius:10px;
}

</style>
</head>

<body>

<h1>📚 GCSE Revision App</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="card">

<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Streak 🔥: <span id="streak">0</span></div>

</div>

<div class="card">

<h3>Subjects</h3>

<select id="subjectSelect" onchange="populateTopics()"></select>
<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<div id="question"></div>

</div>

<div class="card">

<h3>⏱ Pomodoro Timer</h3>

<div id="timer">25:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>📈 Revision Progress</h3>
<canvas id="progressChart"></canvas>

</div>

<div class="card">

<h3>🏅 Achievements</h3>
<ul id="badges"></ul>

</div>

<script>


const subjects = {

"Maths (OCR)": {

"Fractions":[
"Simplify 12/18",
"Convert 0.375 to a fraction",
"Add 3/5 + 2/7",
"Multiply 4/9 by 3/5",
"Divide 5/8 by 2"
],

"Algebra":[
"Simplify 3x + 7x",
"Solve x + 8 = 19",
"Factorise x² + 6x",
"Solve 2x + 5 = 17",
"Expand 3(x+4)"
],

"Quadratics":[
"Solve x² − 9 = 0",
"Factorise x² + 7x + 12",
"Find roots of x² − 4x = 0",
"What is a quadratic equation?",
"Sketch y = x²"
]

},

"Combined Science (AQA)": {

"Cell Biology":[
"What is mitosis?",
"What is diffusion?",
"What does the nucleus do?",
"Function of mitochondria",
"Difference between plant and animal cells"
],

"Atomic Structure":[
"What is an isotope?",
"What charge does an electron have?",
"What is the atomic number?",
"What is a neutron?",
"How many protons are in carbon?"
],

"Electricity":[
"What is current?",
"What is voltage?",
"What is resistance?",
"What is Ohm's Law?",
"What is a parallel circuit?"
]

},

"Computer Science (OCR)": {

"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is the control unit?",
"What is clock speed?",
"What is a register?"
],

"Memory":[
"What is RAM?",
"What is ROM?",
"What is cache memory?",
"What is virtual memory?",
"Difference between RAM and ROM"
]

},

"Geography (AQA)": {

"Natural Hazards":[
"What causes earthquakes?",
"What is a tectonic plate?",
"What causes volcanoes?",
"What is a tsunami?",
"Name one effect of an earthquake"
],

"Rivers":[
"What is erosion?",
"What is deposition?",
"What is a meander?",
"What is a floodplain?",
"What causes flooding?"
]

},

"German (AQA)": {

"Family":[
"Translate: My mother is kind",
"What does 'Bruder' mean?",
"What does 'Schwester' mean?",
"Describe your family in German",
"Translate: I have two brothers"
],

"School":[
"Translate: I go to school",
"What is 'Lehrer'?",
"What is 'Hausaufgaben'?",
"Name three school subjects in German",
"Describe your school day"
]

},

"English (AQA)": {

"Language Analysis":[
"What is a metaphor?",
"What is a simile?",
"What is imagery?",
"What is descriptive language?",
"Explain the effect on the reader"
],

"Creative Writing":[
"Write an opening sentence for a story",
"Describe a storm",
"Describe a mysterious setting",
"Create a character introduction",
"Write a tense moment"
]

},

"Media Studies": {

"Representation":[
"What is representation?",
"What is a stereotype?",
"Give an example of media bias",
"Why is representation important?",
"What is audience perception?"
],

"Audience":[
"What is target audience?",
"What is demographics?",
"What is psychographics?",
"What is audience reception?",
"How do media companies attract audiences?"
]

}

};
"Computer Science":{
"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is clock speed?"
],

"Memory":[
"What is RAM?",
"What is ROM?",
"What is cache memory?"
]

}

};

let xp=parseInt(localStorage.getItem("xp")||0);
let streak=parseInt(localStorage.getItem("streak")||0);

document.getElementById("xp").innerText=xp;
document.getElementById("streak").innerText=streak;

function level(){return Math.floor(xp/100)+1}
document.getElementById("level").innerText=level();

function populateSubjects(){

let s=document.getElementById("subjectSelect");

for(let subject in subjects){

let opt=document.createElement("option");
opt.text=subject;
opt.value=subject;

s.add(opt);

}

populateTopics();

}

function populateTopics(){

let subject=document.getElementById("subjectSelect").value;
let t=document.getElementById("topicSelect");

t.innerHTML="";

for(let topic in subjects[subject]){

let opt=document.createElement("option");
opt.text=topic;
opt.value=topic;

t.add(opt);

}

}

function generateQuestion(){

let subject=document.getElementById("subjectSelect").value;
let topic=document.getElementById("topicSelect").value;

let list=subjects[subject][topic];

let q=list[Math.floor(Math.random()*list.length)];

document.getElementById("question").innerText=q;

gainXP();
updateChart();
checkBadges();

}

function gainXP(){

xp+=10;
localStorage.setItem("xp",xp);

document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level();

}

function toggleDark(){

document.body.classList.toggle("dark");

}

let time=1500;
let timerInterval;

function startTimer(){

timerInterval=setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) clearInterval(timerInterval);

},1000)

}

function resetTimer(){

clearInterval(timerInterval);
time=1500;
document.getElementById("timer").innerText="25:00";

}

const ctx=document.getElementById("progressChart");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:["Start"],
datasets:[{
label:"XP Progress",
data:[xp]
}]
}
});

function updateChart(){

chart.data.labels.push("Study");
chart.data.datasets[0].data.push(xp);
chart.update();

}

function checkBadges(){

let badges=document.getElementById("badges");

badges.innerHTML="";

if(xp>=50) badges.innerHTML+="<li>⭐ Beginner</li>";
if(xp>=200) badges.innerHTML+="<li>🔥 Study Streak</li>";
if(xp>=500) badges.innerHTML+="<li>🏆 Revision Master</li>";

}

populateSubjects();

</script>

</body>
</html>
