```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef2ff;
margin:0;
padding:25px;
}

.dark{
background:#111827;
color:white;
}

button{
padding:10px 14px;
background:#4f8cff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.dark .card{
background:#1f2937;
}

select,input{
width:100%;
padding:8px;
margin:6px 0;
}

#timer{
font-size:28px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>📚 GCSE Revision App</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="card">
XP: <span id="xp">0</span><br>
Level: <span id="level">1</span><br>
Streak 🔥: <span id="streak">0</span>
</div>

<div class="card">

<h3>🧠 Quiz Generator</h3>

<select id="subjectSelect"></select>

<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<p id="question"></p>

</div>

<div class="card">

<h3>⏱ Pomodoro Timer</h3>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>📈 Progress</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>🏅 Achievements</h3>
<ul id="badges"></ul>

</div>

<div class="card">

<h3>📅 Revision Timetable</h3>

<input id="days" type="number" placeholder="Days to revise">

<button onclick="generateTimetable()">Generate</button>

<table id="timetable"></table>

</div>

<script>

const subjects = {

"Maths (OCR)": {
"Algebra":[
"Solve 3x + 5 = 20",
"Expand 4(x+2)",
"Factorise x² + 5x"
],
"Fractions":[
"Simplify 12/18",
"Add 3/5 + 2/7",
"Multiply 2/3 × 4/5"
]
},

"Combined Science (AQA)": {
"Cells":[
"What is mitosis?",
"What does the nucleus do?",
"What is diffusion?"
],
"Electricity":[
"What is voltage?",
"What is current?",
"What is resistance?"
]
},

"Computer Science (OCR)": {
"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is clock speed?"
],
"Memory":[
"What is RAM?",
"What is ROM?",
"What is cache memory?"
]
},

"Geography (AQA)": {
"Rivers":[
"What is erosion?",
"What is deposition?",
"What is a meander?"
],
"Hazards":[
"What causes earthquakes?",
"What is a tectonic plate?"
]
},

"German (AQA)": {
"Family":[
"What does 'Bruder' mean?",
"What does 'Schwester' mean?"
],
"School":[
"What is 'Lehrer'?",
"What is 'Hausaufgaben'?"
]
},

"English (AQA)": {
"Language":[
"What is a simile?",
"What is a metaphor?"
],
"Creative Writing":[
"Describe a storm",
"Write a story opening"
]
},

"Media Studies": {
"Representation":[
"What is representation?",
"What is a stereotype?"
],
"Audience":[
"What is target audience?",
"What is demographics?"
]
}

};

let xp = parseInt(localStorage.getItem("xp") || 0);
let streak = parseInt(localStorage.getItem("streak") || 0);

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

function getLevel(){
return Math.floor(xp/100)+1;
}

document.getElementById("level").innerText = getLevel();

const subjectSelect = document.getElementById("subjectSelect");
const topicSelect = document.getElementById("topicSelect");

for(let subject in subjects){

let option=document.createElement("option");
option.value=subject;
option.textContent=subject;

subjectSelect.appendChild(option);

}

function updateTopics(){

topicSelect.innerHTML="";

let subject=subjectSelect.value;

for(let topic in subjects[subject]){

let option=document.createElement("option");
option.value=topic;
option.textContent=topic;

topicSelect.appendChild(option);

}

}

subjectSelect.addEventListener("change",updateTopics);

updateTopics();

function generateQuestion(){

let subject=subjectSelect.value;
let topic=topicSelect.value;

let list=subjects[subject][topic];

let question=list[Math.floor(Math.random()*list.length)];

document.getElementById("question").innerText=question;

gainXP();
updateChart();
checkBadges();

}

function gainXP(){

xp+=10;

localStorage.setItem("xp",xp);

document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=getLevel();

}

function toggleDark(){

document.body.classList.toggle("dark");

}

let time=1500;
let timer;

function startTimer(){

timer=setInterval(function(){

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) clearInterval(timer);

},1000);

}

function resetTimer(){

clearInterval(timer);

time=1500;

document.getElementById("timer").innerText="25:00";

}

const ctx=document.getElementById("chart");

const chart=new Chart(ctx,{
type:"line",
data:{
labels:["Start"],
datasets:[{
label:"XP Progress",
data:[xp]
}]
}
});

function updateChart(){

chart.data.labels.push("Study");
chart.data.datasets[0].data.push(xp);

chart.update();

}

function checkBadges(){

let list=document.getElementById("badges");

list.innerHTML="";

if(xp>=50) list.innerHTML+="<li>⭐ Beginner</li>";
if(xp>=200) list.innerHTML+="<li>🔥 Consistent Learner</li>";
if(xp>=500) list.innerHTML+="<li>🏆 Revision Master</li>";

}

function generateTimetable(){

let days=document.getElementById("days").value;

let table=document.getElementById("timetable");

table.innerHTML="";

let subjectsList=Object.keys(subjects);

for(let i=1;i<=days;i++){

let subject=subjectsList[Math.floor(Math.random()*subjectsList.length)];

table.innerHTML+=`<tr><td>Day ${i}</td><td>${subject}</td></tr>`;

}

}

</script>

</body>
</html>
```
