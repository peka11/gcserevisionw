```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#eef2f7;
--card:#ffffff;
--primary:#4f8cff;
--secondary:#7bdcb5;
--text:#222;
}

.dark{
--bg:#111827;
--card:#1f2937;
--primary:#60a5fa;
--secondary:#34d399;
--text:#f3f4f6;
}

body{
font-family:Poppins,sans-serif;
background:var(--bg);
margin:0;
padding:25px;
color:var(--text);
transition:0.3s;
}

h1{
text-align:center;
margin-bottom:10px;
}

.topbar{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
background:var(--primary);
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
opacity:0.9;
}

.dashboard{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
min-width:160px;
text-align:center;
}

.big{
font-size:28px;
font-weight:600;
color:var(--primary);
}

.subject{
background:var(--card);
margin-bottom:20px;
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
transition:0.2s;
}

.subject:hover{
transform:translateY(-4px);
}

.progress-container{
background:#e5e7eb;
border-radius:20px;
height:12px;
margin:10px 0;
overflow:hidden;
}

.progress{
background:linear-gradient(90deg,var(--primary),var(--secondary));
height:100%;
width:0%;
transition:width .4s;
}

label{
display:block;
margin:6px 0;
cursor:pointer;
}

.section{
background:var(--card);
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
margin-top:25px;
}

select,input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:6px;
width:100%;
}

#question{
margin-top:15px;
font-weight:600;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td,th{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<h1>📚 GCSE Revision App</h1>

<div class="topbar">
<button onclick="toggleDark()">🌙 Toggle Dark Mode</button>
</div>

<div class="dashboard">

<div class="card">
<div class="big" id="totalProgress">0%</div>
Progress
</div>

<div class="card">
<div class="big" id="streak">0</div>
Streak 🔥
</div>

<div class="card">
<div class="big" id="xp">0</div>
XP ⭐
</div>

<div class="card">
<div class="big" id="level">1</div>
Level 🏆
</div>

</div>

<div id="subjects"></div>

<div class="section">

<h2>🧠 Quiz Generator</h2>

<select id="subjectSelect" onchange="populateTopics()"></select>
<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<div id="question">Select a topic to start.</div>

</div>

<div class="section">

<h2>📅 Revision Timetable Generator</h2>

<input id="days" type="number" placeholder="How many days to revise?">

<button onclick="generateTimetable()">Generate Timetable</button>

<table id="timetable"></table>

</div>

<script>

const subjects={
"Maths":["Fractions","Algebra","Quadratics","Graphs","Percentages"],
"Science":["Cells","Atoms","Electricity","Energy","Forces"],
"Computer Science":["CPU","Memory","Algorithms","Networks"],
"Geography":["Rivers","Earthquakes","Climate","Urban Issues"],
"German":["Family","School","Holidays","Food"],
"English":["Language Analysis","Creative Writing","Poetry"],
"Media":["Representation","Audience","Industry"]
};

const questions=[

"What is a metaphor?",
"Solve 3x + 5 = 20",
"What is photosynthesis?",
"What does the CPU do?",
"What causes earthquakes?",
"Translate 'I go to school' into German",
"What is a simile?",
"What is Ohm's Law?",
"What is RAM?",
"What is erosion?",
"What is audience representation?",
"What is a quadratic equation?",
"What is diffusion?",
"What is a network protocol?",
"What is climate change?",
"What is persuasive language?"

];

function renderSubjects(){

let container=document.getElementById("subjects");
container.innerHTML="";

for(let subject in subjects){

let div=document.createElement("div");
div.className="subject";

let html=`<h3>${subject}</h3>
<div class="progress-container">
<div class="progress" id="prog-${subject}"></div>
</div>`;

subjects[subject].forEach(topic=>{

let key=subject+"-"+topic;
let saved=localStorage.getItem(key)==="true";

html+=`<label>
<input type="checkbox"
${saved?"checked":""}
id="${key}"
onchange="updateProgress('${subject}')">
${topic}
</label>`;

});

div.innerHTML=html;
container.appendChild(div);

updateProgress(subject);

}

updateDashboard();

}

function updateProgress(subject){

let done=0;
let total=subjects[subject].length;

subjects[subject].forEach(topic=>{

let key=subject+"-"+topic;
let box=document.getElementById(key);

if(box.checked) done++;

localStorage.setItem(key,box.checked);

});

let percent=Math.round(done/total*100);

document.getElementById("prog-"+subject).style.width=percent+"%";

updateDashboard();

}

function updateDashboard(){

let total=0;
let done=0;

for(let subject in subjects){

subjects[subject].forEach(topic=>{

total++;

if(localStorage.getItem(subject+"-"+topic)==="true") done++;

});

}

let percent=Math.round(done/total*100);

document.getElementById("totalProgress").innerText=percent+"%";

}

function populateSubjects(){

let s=document.getElementById("subjectSelect");

for(let subject in subjects){

let opt=document.createElement("option");
opt.value=subject;
opt.text=subject;
s.add(opt);

}

populateTopics();

}

function populateTopics(){

let subject=document.getElementById("subjectSelect").value;
let t=document.getElementById("topicSelect");

t.innerHTML="";

subjects[subject].forEach(topic=>{

let opt=document.createElement("option");
opt.value=topic;
opt.text=topic;
t.add(opt);

});

}

function generateQuestion(){

let q=questions[Math.floor(Math.random()*questions.length)];

document.getElementById("question").innerText=q;

addXP();
updateStreak();

}

function addXP(){

let xp=parseInt(localStorage.getItem("xp")||0);

xp+=10;

localStorage.setItem("xp",xp);

document.getElementById("xp").innerText=xp;

let level=Math.floor(xp/100)+1;

document.getElementById("level").innerText=level;

}

function updateStreak(){

let today=new Date().toDateString();
let last=localStorage.getItem("lastStudy");
let streak=parseInt(localStorage.getItem("streak")||0);

if(last!==today){

streak++;

localStorage.setItem("streak",streak);
localStorage.setItem("lastStudy",today);

}

document.getElementById("streak").innerText=streak;

}

function generateTimetable(){

let days=document.getElementById("days").value;

let table=document.getElementById("timetable");

table.innerHTML="<tr><th>Day</th><th>Subject</th></tr>";

let subjectsList=Object.keys(subjects);

for(let i=1;i<=days;i++){

let subject=subjectsList[Math.floor(Math.random()*subjectsList.length)];

table.innerHTML+=`<tr><td>Day ${i}</td><td>${subject}</td></tr>`;

}

}

function toggleDark(){

document.body.classList.toggle("dark");

}

function loadStats(){

document.getElementById("xp").innerText=localStorage.getItem("xp")||0;

let xp=parseInt(localStorage.getItem("xp")||0);

document.getElementById("level").innerText=Math.floor(xp/100)+1;

document.getElementById("streak").innerText=localStorage.getItem("streak")||0;

}

populateSubjects();
renderSubjects();
loadStats();

</script>

</body>
</html>
