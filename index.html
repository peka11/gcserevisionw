```html
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GCSE Revision App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="questions.js"></script>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f6fb;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
}

button{
background:#4f7cff;
border:none;
color:white;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

select,input{
width:100%;
padding:8px;
margin-top:6px;
}

#timer{
font-size:30px;
font-weight:bold;
margin:10px 0;
}

</style>

</head>

<body>

<header>

<h1>📚 GCSE Revision</h1>

<button onclick="toggleDark()">🌙</button>

</header>

<div class="grid">

<div class="card">
<h3>XP</h3>
<div id="xp">0</div>
</div>

<div class="card">
<h3>Level</h3>
<div id="level">1</div>
</div>

<div class="card">
<h3>Streak 🔥</h3>
<div id="streak">0</div>
</div>

</div>

<div class="card">

<h3>Quiz</h3>

<select id="subjectSelect"></select>
<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<p id="question"></p>

</div>

<div class="card">

<h3>Pomodoro</h3>

<div id="timer">25:00</div>

<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>Progress</h3>

<canvas id="chart"></canvas>

</div>

<script>

let xp=parseInt(localStorage.getItem("xp")||0)
let streak=parseInt(localStorage.getItem("streak")||0)

document.getElementById("xp").innerText=xp
document.getElementById("streak").innerText=streak

function level(){
return Math.floor(xp/100)+1
}

document.getElementById("level").innerText=level()

const subjectSelect=document.getElementById("subjectSelect")
const topicSelect=document.getElementById("topicSelect")

for(let subject in questionBank){

let option=document.createElement("option")
option.value=subject
option.textContent=subject

subjectSelect.appendChild(option)

}

function updateTopics(){

topicSelect.innerHTML=""

let subject=subjectSelect.value

for(let topic in questionBank[subject]){

let option=document.createElement("option")

option.value=topic
option.textContent=topic

topicSelect.appendChild(option)

}

}

subjectSelect.addEventListener("change",updateTopics)

updateTopics()

function generateQuestion(){

let subject=subjectSelect.value
let topic=topicSelect.value

let list=questionBank[subject][topic]

let q=list[Math.floor(Math.random()*list.length)]

document.getElementById("question").innerText=q

xp+=10

if(streak>0) xp+=5

localStorage.setItem("xp",xp)

document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level()

updateChart()

}

let time=1500
let timer

function startTimer(){

timer=setInterval(()=>{

time--

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s

if(time<=0) clearInterval(timer)

},1000)

}

function resetTimer(){

clearInterval(timer)

time=1500

document.getElementById("timer").innerText="25:00"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

const ctx=document.getElementById("chart")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:["Start"],
datasets:[{
label:"XP",
data:[xp]
}]
}
})

function updateChart(){

chart.data.labels.push("Study")

chart.data.datasets[0].data.push(xp)

chart.update()

}

</script>

</body>
</html>
