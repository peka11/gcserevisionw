```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef3ff;
margin:0;
padding:25px;
}

.dark{
background:#111;
color:white;
}

h1{text-align:center;}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#4f8cff;
color:white;
cursor:pointer;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.dark .card{
background:#222;
}

.progress{
height:10px;
background:#ddd;
border-radius:10px;
margin:10px 0;
}

.progress div{
height:100%;
background:#4f8cff;
width:0%;
border-radius:10px;
}

</style>
</head>

<body>

<h1>📚 GCSE Revision App</h1>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="card">

<div>XP: <span id="xp">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Streak 🔥: <span id="streak">0</span></div>

</div>

<div class="card">

<h3>Subjects</h3>

<select id="subjectSelect" onchange="populateTopics()"></select>
<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<div id="question"></div>

</div>

<div class="card">

<h3>⏱ Pomodoro Timer</h3>

<div id="timer">25:00</div>
<button onclick="startTimer()">Start</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="card">

<h3>📈 Revision Progress</h3>
<canvas id="progressChart"></canvas>

</div>

<div class="card">

<h3>🏅 Achievements</h3>
<ul id="badges"></ul>

</div>

<script>

const subjects={

"Maths":{
"Algebra":[
"Solve 3x+5=20",
"Expand 4(x+2)",
"Factorise x²+5x",
"Solve 2x-7=9"
],

"Fractions":[
"Simplify 12/18",
"Add 3/5 + 2/7",
"Multiply 2/3 by 4/5",
"Convert 0.25 to fraction"
]

},

"Science":{
"Cells":[
"What is mitosis?",
"What does the nucleus do?",
"What is diffusion?",
"Function of mitochondria"
],

"Electricity":[
"What is voltage?",
"What is current?",
"What is resistance?",
"State Ohm's Law"
]

},

"Computer Science":{
"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is clock speed?"
],

"Memory":[
"What is RAM?",
"What is ROM?",
"What is cache memory?"
]

}

};

let xp=parseInt(localStorage.getItem("xp")||0);
let streak=parseInt(localStorage.getItem("streak")||0);

document.getElementById("xp").innerText=xp;
document.getElementById("streak").innerText=streak;

function level(){return Math.floor(xp/100)+1}
document.getElementById("level").innerText=level();

function populateSubjects(){

let s=document.getElementById("subjectSelect");

for(let subject in subjects){

let opt=document.createElement("option");
opt.text=subject;
opt.value=subject;

s.add(opt);

}

populateTopics();

}

function populateTopics(){

let subject=document.getElementById("subjectSelect").value;
let t=document.getElementById("topicSelect");

t.innerHTML="";

for(let topic in subjects[subject]){

let opt=document.createElement("option");
opt.text=topic;
opt.value=topic;

t.add(opt);

}

}

function generateQuestion(){

let subject=document.getElementById("subjectSelect").value;
let topic=document.getElementById("topicSelect").value;

let list=subjects[subject][topic];

let q=list[Math.floor(Math.random()*list.length)];

document.getElementById("question").innerText=q;

gainXP();
updateChart();
checkBadges();

}

function gainXP(){

xp+=10;
localStorage.setItem("xp",xp);

document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=level();

}

function toggleDark(){

document.body.classList.toggle("dark");

}

let time=1500;
let timerInterval;

function startTimer(){

timerInterval=setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+(s<10?"0":"")+s;

if(time<=0) clearInterval(timerInterval);

},1000)

}

function resetTimer(){

clearInterval(timerInterval);
time=1500;
document.getElementById("timer").innerText="25:00";

}

const ctx=document.getElementById("progressChart");

let chart=new Chart(ctx,{
type:"line",
data:{
labels:["Start"],
datasets:[{
label:"XP Progress",
data:[xp]
}]
}
});

function updateChart(){

chart.data.labels.push("Study");
chart.data.datasets[0].data.push(xp);
chart.update();

}

function checkBadges(){

let badges=document.getElementById("badges");

badges.innerHTML="";

if(xp>=50) badges.innerHTML+="<li>⭐ Beginner</li>";
if(xp>=200) badges.innerHTML+="<li>🔥 Study Streak</li>";
if(xp>=500) badges.innerHTML+="<li>🏆 Revision Master</li>";

}

populateSubjects();

</script>

</body>
</html>
```
