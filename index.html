<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCSE Revision Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f2f5f9;
margin:0;
padding:25px;
color:#333;
}

h1{
text-align:center;
margin-bottom:10px;
}

.dashboard{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:25px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
min-width:180px;
text-align:center;
}

.big{
font-size:28px;
font-weight:600;
color:#2b79c7;
}

.subject{
background:white;
margin-bottom:20px;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:transform .15s;
}

.subject:hover{
transform:translateY(-3px);
}

.progress-container{
background:#e6e9ef;
border-radius:20px;
height:14px;
margin:10px 0;
overflow:hidden;
}

.progress{
background:linear-gradient(90deg,#2b79c7,#4fb3ff);
height:100%;
width:0%;
transition:width .4s;
}

label{
display:block;
margin:6px 0;
cursor:pointer;
}

.quiz{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-top:20px;
}

select,button{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:8px;
width:100%;
}

button{
background:#2b79c7;
color:white;
border:none;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#1f5fa8;
}

#question{
margin-top:15px;
font-weight:600;
}

</style>
</head>

<body>

<h1>📚 GCSE Revision Tracker</h1>

<div class="dashboard">

<div class="card">
<div class="big" id="totalProgress">0%</div>
Total Progress
</div>

<div class="card">
<div class="big" id="streak">0</div>
Day Streak 🔥
</div>

</div>

<div id="subjects"></div>

<div class="quiz">

<h2>🧠 Quiz Generator</h2>

<select id="subjectSelect" onchange="populateTopics()"></select>

<select id="topicSelect"></select>

<button onclick="generateQuestion()">Generate Question</button>

<div id="question">Select a topic to begin.</div>

</div>

<script>

const subjects={
"Maths":{
"Fractions":[
"Simplify 12/18",
"Convert 0.375 to a fraction",
"Add 3/5 + 2/7",
"Multiply 4/9 by 3/5",
"Divide 5/8 by 2"
],
"Algebra":[
"Simplify 3x + 7x",
"Solve x + 8 = 19",
"Factorise x² + 6x",
"Solve 2x + 5 = 17",
"Expand 3(x+4)"
],
"Quadratics":[
"Solve x² - 9 = 0",
"Factorise x² + 7x + 12",
"Find roots of x² - 4x = 0",
"What is a quadratic equation?",
"Sketch y = x²"
]
},

"Science":{
"Cell Biology":[
"What is mitosis?",
"Function of mitochondria",
"Difference between plant and animal cells",
"Define diffusion",
"What does the nucleus do?"
],
"Atomic Structure":[
"What is an isotope?",
"Number of protons in carbon",
"What charge does an electron have?",
"Define atomic number",
"What is a neutron?"
]
},

"Computer Science":{
"CPU":[
"What does the CPU do?",
"What is the ALU?",
"What is the control unit?",
"What is clock speed?",
"What is a register?"
]
}

};

function renderSubjects(){

let container=document.getElementById("subjects");
container.innerHTML="";

for(let subject in subjects){

let div=document.createElement("div");
div.className="subject";

let html=`<h3>${subject}</h3>
<div class="progress-container">
<div class="progress" id="prog-${subject}"></div>
</div>`;

let topics=subjects[subject];

for(let topic in topics){

let key=`${subject}-${topic}`;
let saved=localStorage.getItem(key)==="true";

html+=`<label>
<input type="checkbox"
id="${key}"
${saved?"checked":""}
onchange="updateProgress('${subject}')">
${topic}
</label>`;

}

div.innerHTML=html;
container.appendChild(div);

updateProgress(subject);

}

updateDashboard();

}

function updateProgress(subject){

let topics=subjects[subject];
let done=0;
let total=Object.keys(topics).length;

for(let topic in topics){

let key=`${subject}-${topic}`;
let box=document.getElementById(key);

if(box.checked) done++;

localStorage.setItem(key,box.checked);

}

let percent=Math.round(done/total*100);

document.getElementById(`prog-${subject}`).style.width=percent+"%";

updateDashboard();

}

function updateDashboard(){

let total=0;
let done=0;

for(let subject in subjects){

let topics=subjects[subject];

for(let topic in topics){

total++;

if(localStorage.getItem(`${subject}-${topic}`)==="true") done++;

}

}

let percent=Math.round(done/total*100);

document.getElementById("totalProgress").innerText=percent+"%";

}

function populateSubjects(){

let s=document.getElementById("subjectSelect");

for(let subject in subjects){

let opt=document.createElement("option");
opt.value=subject;
opt.text=subject;
s.add(opt);

}

populateTopics();

}

function populateTopics(){

let subject=document.getElementById("subjectSelect").value;
let t=document.getElementById("topicSelect");

t.innerHTML="";

for(let topic in subjects[subject]){

let opt=document.createElement("option");
opt.value=topic;
opt.text=topic;
t.add(opt);

}

}

function generateQuestion(){

let subject=document.getElementById("subjectSelect").value;
let topic=document.getElementById("topicSelect").value;

let questions=subjects[subject][topic];

let q=questions[Math.floor(Math.random()*questions.length)];

document.getElementById("question").innerText=q;

updateStreak();

}

function updateStreak(){

let today=new Date().toDateString();
let last=localStorage.getItem("lastStudy");
let streak=parseInt(localStorage.getItem("streak")||0);

if(last!==today){

streak++;
localStorage.setItem("streak",streak);
localStorage.setItem("lastStudy",today);

}

document.getElementById("streak").innerText=streak;

}

function loadStreak(){

let streak=localStorage.getItem("streak")||0;
document.getElementById("streak").innerText=streak;

}

populateSubjects();
renderSubjects();
loadStreak();

</script>

</body>
</html>
