<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎓 GCSE Revision App - Pro UI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== Fonts & Body ===== */
body {
  font-family:'Inter',sans-serif;
  margin:0;
  padding:20px;
  background: linear-gradient(135deg, #f0f4f8, #dbeafe);
  color:#1f2937;
  transition:0.5s;
}
.dark {background:#111827;color:white;}

/* ===== Header ===== */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
header h1 {
  font-size:28px;
  font-weight:700;
}
header button {
  font-size:18px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4f7cff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
header button:hover {background:#3561c3;}

/* ===== Grid Cards ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}
.card {
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}
.dark .card {background:#1f2937;}

/* ===== Buttons ===== */
button {
  font-weight:600;
  transition:0.2s;
}
button:hover {opacity:0.9;}

/* ===== Select & Input ===== */
select,input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

/* ===== Quiz & Progress ===== */
#question {margin-top:10px;font-weight:600;font-size:16px;}
.progress-bar {
  height:24px;
  width:100%;
  background:#ddd;
  border-radius:12px;
  overflow:hidden;
  margin-top:10px;
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
}
.progress-fill {
  height:100%;
  width:0%;
  background: linear-gradient(90deg,#4f7cff,#34c759);
  text-align:center;
  color:white;
  line-height:24px;
  font-weight:bold;
  transition:width 0.5s;
}

/* ===== Timer ===== */
#timer {
  font-size:32px;
  font-weight:bold;
  text-align:center;
  margin:10px 0;
}

/* ===== Table ===== */
table {
  border-collapse: separate;
  border-spacing: 0 10px;
  width:100%;
}
th, td {
  padding:10px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
}
td {transition:0.2s;}
td:hover {opacity:0.85; transform: scale(1.03);}
th {background:#4f7cff;color:white;}

/* ===== Dark Mode Adjustments ===== */
.dark select,input, .dark th, .dark td {border-color:#555;}
.dark th {background:#5856d6;}
.dark td {color:white;}
</style>
</head>
<body>

<header>
<h1>🎓 GCSE Revision App</h1>
<button id="darkBtn">🌙</button>
</header>

<div class="grid">
<div class="card"><h3>XP</h3><div id="xp">0</div></div>
<div class="card"><h3>Level</h3><div id="level">1</div></div>
<div class="card"><h3>Streak 🔥</h3><div id="streak">0</div></div>
</div>

<div class="card">
<h3>🧠 Quiz Generator</h3>
<select id="subjectSelect"></select>
<select id="topicSelect"></select>
<button id="generateQuestionBtn">Generate Question</button>
<p id="question"></p>
<div class="progress-bar"><div class="progress-fill" id="quizProgress">0%</div></div>
</div>

<div class="card">
<h3>⏱ Pomodoro Timer</h3>
<div id="timer">25:00</div>
<button id="startTimerBtn">Start</button>
<button id="resetTimerBtn">Reset</button>
</div>

<div class="card">
<h3>📊 Subject Progress</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 Revision Timetable</h3>
<input id="days" type="number" placeholder="Days to revise">
<button id="generateTimetableBtn">Generate Timetable</button>
<div id="timetableContainer" style="overflow-x:auto; margin-top:15px;"></div>
</div>

<script>
// ===== Subjects + Topics =====
const questionBank = {
"Maths (OCR)":{"Algebra":["Solve 3x+5=20","Expand 4(x+2)","Factorise x^2+5x+6"],"Fractions":["Simplify 12/18","Add 3/5 + 2/7","Convert 0.75 to fraction"]},
"Combined Science (AQA Gateway)":{"Cell biology":["What is mitosis?","Function of nucleus","Function of cell membrane"]},
"Computer Science (OCR)":{"Systems architecture":["CPU components","Von Neumann architecture"]},
"Geography (AQA)":{"Natural hazards":["Causes of earthquakes?","Causes of volcanoes"]},
"German (AQA)":{"Family":["Translate: My mother is kind","Bruder = brother"]},
"English (AQA)":{"Language paper 1":["Define metaphor","Simile examples"]},
"Media Studies":{"Media language":["Define codes","Signifier examples"]}
};
const subjectColors = {
"Maths (OCR)":"#4f7cff","Combined Science (AQA Gateway)":"#34c759",
"Computer Science (OCR)":"#ff9500","Geography (AQA)":"#ff2d55",
"German (AQA)":"#5856d6","English (AQA)":"#ffcc00","Media Studies":"#ff3b30"
};

// ===== XP, Streak, Level =====
let xp = parseInt(localStorage.getItem("xp")||0);
let streak = parseInt(localStorage.getItem("streak")||0);
function updateXP(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp/100)+1;
  document.getElementById("streak").innerText = streak;
}

// ===== Populate Subjects / Topics =====
const subjectSelect = document.getElementById("subjectSelect");
const topicSelect = document.getElementById("topicSelect");
for(let subject in questionBank){
  let opt = document.createElement("option"); opt.value=subject; opt.textContent=subject; subjectSelect.appendChild(opt);
}
function updateTopics(){
  topicSelect.innerHTML="";
  let subj = subjectSelect.value;
  for(let topic in questionBank[subj]){
    let opt = document.createElement("option"); opt.value=topic; opt.textContent=topic; topicSelect.appendChild(opt);
  }
}
subjectSelect.addEventListener("change",updateTopics);
updateTopics();
updateXP();

// ===== Quiz Generator =====
const progressFill = document.getElementById("quizProgress");
document.getElementById("generateQuestionBtn").addEventListener("click",()=>{
  let subj = subjectSelect.value;
  let top = topicSelect.value;
  let list = questionBank[subj][top];
  let q = list[Math.floor(Math.random()*list.length)];
  document.getElementById("question").innerText = q;
  xp+=10; streak+=1; localStorage.setItem("xp",xp); localStorage.setItem("streak",streak);
  updateXP();
  let percent = Math.min(Math.floor(xp/12),100);
  progressFill.style.width = percent + "%"; progressFill.innerText = percent+"%";
});

// ===== Dark Mode =====
document.getElementById("darkBtn").addEventListener("click",()=>{document.body.classList.toggle("dark");});

// ===== Timer =====
let time = 1500; let timer;
document.getElementById("startTimerBtn").addEventListener("click",()=>{
  clearInterval(timer);
  timer=setInterval(()=>{
    time--; let m=Math.floor(time/60); let s=time%60;
    document.getElementById("timer").innerText=m+":"+(s<10?"0":"")+s;
    if(time<=0) clearInterval(timer);
  },1000);
});
document.getElementById("resetTimerBtn").addEventListener("click",()=>{
  clearInterval(timer); time=1500; document.getElementById("timer").innerText="25:00";
});

// ===== Chart =====
const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{type:"line",data:{labels:["Start"],datasets:[]},options:{responsive:true,plugins:{legend:{display:true}}}});

// ===== Timetable =====
document.getElementById("generateTimetableBtn").addEventListener("click",()=>{
  const days = parseInt(document.getElementById("days").value);
  if(!days||days<=0){alert("Enter valid number of days"); return;}
  const container = document.getElementById("timetableContainer");
  container.innerHTML="";
  const subjectsList = Object.keys(questionBank);
  const table = document.createElement("table");
  const headerRow=document.createElement("tr"); headerRow.innerHTML="<th>Day</th><th>Session 1</th><th>Session 2</th><th>Session 3</th>"; table.appendChild(headerRow);
  for(let i=1;i<=days;i++){
    const row=document.createElement("tr");
    const dayCell=document.createElement("td"); dayCell.innerText="Day "+i; row.appendChild(dayCell);
    for(let s=0;s<3;s++){
      const subj=subjectsList[Math.floor(Math.random()*subjectsList.length)];
      const topics=Object.keys(questionBank[subj]);
      const topic=topics[Math.floor(Math.random()*topics.length)];
      const cell=document.createElement("td"); cell.innerText=`${subj}: ${topic}`;
      cell.style.backgroundColor=subjectColors[subj]||"#888"; cell.style.color="white"; cell.style.fontWeight="bold"; cell.style.borderRadius="8px";
      cell.addEventListener("click",()=>{
        subjectSelect.value=subj; updateTopics(); topicSelect.value=topic; document.getElementById("generateQuestionBtn").click();
      });
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
  container.appendChild(table);
});
</script>
</body>
</html>
