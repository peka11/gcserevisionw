<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate GCSE Revision App 🎓</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
padding:0;
background:#f0f4f8;
color:#1f2937;
transition:0.3s;
}

.dark{
background:#0f172a;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:260px;
background:linear-gradient(180deg,#4f7cff,#3561c3);
padding:20px;
display:flex;
flex-direction:column;
color:white;
box-shadow:4px 0 20px rgba(0,0,0,0.15);
}

.sidebar h2{
margin-top:0;
margin-bottom:20px;
font-size:22px;
}

.sidebar button{
background:none;
border:none;
color:white;
text-align:left;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.sidebar button:hover{
background:rgba(255,255,255,0.25);
transform:translateX(4px);
}

.main{
margin-left:280px;
padding:25px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
margin-bottom:20px;
transition:0.25s;
}

.dark .card{
background:#1f2937;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 20px 35px rgba(0,0,0,0.15);
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#4f7cff;
color:white;
cursor:pointer;
font-weight:600;
margin-top:10px;
transition:0.2s;
}

button:hover{
background:#2f4fd6;
transform:scale(1.03);
}

input, select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

.progress-bar{
height:24px;
width:100%;
background:#ddd;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

.progress-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#4f7cff,#34c759);
text-align:center;
color:white;
line-height:24px;
font-weight:bold;
transition:width 0.5s;
}

canvas{
max-width:100%;
}

td, th{
padding:10px;
text-align:center;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

th{
background:#4f7cff;
color:white;
}

td:hover{
opacity:0.9;
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="sidebar">

<h2>GCSE App</h2>

<button onclick="showSection('dashboard')">🏠 Dashboard</button>
<button onclick="showSection('quiz')">🧠 Quiz</button>
<button onclick="showSection('timetable')">📅 Timetable</button>
<button onclick="showSection('analytics')">📊 Analytics</button>
<button onclick="showSection('pomodoro')">⏱ Pomodoro</button>
<button onclick="showSection('minigame')">🎮 Mini Game</button>
<button onclick="showSection('settings')">⚙️ Settings</button>
<button id="darkBtn">🌙 Dark Mode</button>

</div>

<div class="main">

<div id="dashboard" class="card section">
<h2>Dashboard</h2>
<p>XP: <span id="xp">0</span></p>
<p>Level: <span id="level">1</span></p>
<p>Streak: <span id="streak">0</span></p>
<p>Badges: <span id="badges">None</span></p>

<div class="progress-bar">
<div class="progress-fill" id="overallProgress">0%</div>
</div>

</div>

<div id="quiz" class="card section" style="display:none;">

<h2>Quiz</h2>

<select id="subjectSelect"></select>
<select id="topicSelect"></select>

<div id="quizArea" style="margin-top:20px;">
<p id="question" style="font-weight:bold;font-size:18px;"></p>
<button id="nextBtn">Next</button>
</div>

</div>

<div id="pomodoro" class="card section" style="display:none;">
<h2>Pomodoro Timer</h2>
<p id="timer">25:00</p>
<button id="startPomodoro">Start</button>
<button id="pausePomodoro">Pause</button>
<button id="resetPomodoro">Reset</button>
</div>

</div>

<script>

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none')
document.getElementById(id).style.display='block'
}

const questionBank={
"Maths (OCR)":{
"Algebra":[
"Solve 2x+5=15",
"Solve 3x-7=11",
"Factorise x^2+5x+6",
"Simplify 3(x+2)-4x",
"Expand (x+4)(x+3)"
],
"Trigonometry":[
"Find sin(30°)",
"Find cos(60°)",
"Find tan(45°)",
"Use Pythagoras to find hypotenuse",
"What is sin²θ+cos²θ?"
]
}
}

const subjectSelect=document.getElementById("subjectSelect")
const topicSelect=document.getElementById("topicSelect")

for(let subject in questionBank){
let opt=document.createElement("option")
opt.value=subject
opt.textContent=subject
subjectSelect.appendChild(opt)
}

function updateTopics(){
topicSelect.innerHTML=""
let subj=subjectSelect.value

for(let topic in questionBank[subj]){
let opt=document.createElement("option")
opt.value=topic
opt.textContent=topic
topicSelect.appendChild(opt)
}
}

subjectSelect.addEventListener("change",()=>{
updateTopics()
loadQuiz()
})

updateTopics()

let currentQuestions=[]
let currentQuestionIndex=0

const questionEl=document.getElementById("question")
const nextBtn=document.getElementById("nextBtn")

function loadQuiz(){
let subj=subjectSelect.value
let top=topicSelect.value
currentQuestions=[...questionBank[subj][top]].sort(()=>Math.random()-0.5)
currentQuestionIndex=0
showQuestion()
}

function showQuestion(){

if(currentQuestionIndex>=currentQuestions.length){
questionEl.innerText="Quiz complete!"
nextBtn.style.display="none"
return
}

questionEl.innerText=currentQuestions[currentQuestionIndex]
nextBtn.style.display="inline-block"
}

nextBtn.addEventListener("click",()=>{
currentQuestionIndex++
showQuestion()
})

topicSelect.addEventListener("change",loadQuiz)

loadQuiz()

document.getElementById("darkBtn").addEventListener("click",()=>{
document.body.classList.toggle("dark")
})

</script>

</body>
</html>
