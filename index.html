<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
body {font-family:'Inter',sans-serif;margin:0;padding:20px;background:#f0f4f8;color:#222;transition:0.3s;}
.dark {background:#111827;color:white;}
header {display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
h1 {margin:0;font-size:26px;}
button {padding:10px 16px;background:#4f7cff;border:none;color:white;border-radius:12px;font-weight:bold;cursor:pointer;transition:0.2s;}
button:hover {background:#3561c3;}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px;}
.card {background:white;padding:20px;border-radius:20px;box-shadow:0 5px 25px rgba(0,0,0,0.1);transition:0.3s;}
.dark .card {background:#1f2937;}
select,input {width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
#timer {font-size:28px;font-weight:bold;margin:10px 0;text-align:center;}
#question {font-weight:bold;margin-top:10px;}
.progress-bar {height:20px;width:100%;background:#ddd;border-radius:10px;overflow:hidden;margin-top:10px;}
.progress-fill {height:100%;width:0%;background:#4f7cff;text-align:center;color:white;line-height:20px;font-weight:bold;transition:width 0.5s;}
table {border-collapse:collapse;width:100%;}
th, td {padding:8px;border:1px solid #ccc;text-align:center;border-radius:10px;}
</style>
</head>
<body>
<header>
<h1>📚 GCSE Revision</h1>
<button id="darkBtn">🌙</button>
</header>

<div class="grid">
<div class="card"><h3>XP</h3><div id="xp">0</div></div>
<div class="card"><h3>Level</h3><div id="level">1</div></div>
<div class="card"><h3>Streak 🔥</h3><div id="streak">0</div></div>
</div>

<div class="card">
<h3>🧠 Quiz Generator</h3>
<select id="subjectSelect"></select>
<select id="topicSelect"></select>
<button id="generateQuestionBtn">Generate Question</button>
<p id="question"></p>
<div class="progress-bar"><div class="progress-fill" id="quizProgress">0%</div></div>
</div>

<div class="card">
<h3>⏱ Pomodoro Timer</h3>
<div id="timer">25:00</div>
<button id="startTimerBtn">Start</button>
<button id="resetTimerBtn">Reset</button>
</div>

<div class="card">
<h3>📊 Subject Progress</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>📅 Revision Timetable</h3>
<input id="days" type="number" placeholder="Days to revise">
<button id="generateTimetableBtn">Generate Timetable</button>
<div id="timetableContainer" style="overflow-x:auto; margin-top:15px;"></div>
</div>

<script>
// ===== GCSE Questions & Topics =====
const questionBank = {
"Maths (OCR)":{"Algebra":["Solve 3x+5=20","Expand 4(x+2)","Factorise x^2+5x+6"],"Fractions":["Simplify 12/18","Add 3/5 + 2/7","Convert 0.75 to fraction"],"Percentages":["Find 20% of 150","Increase 50 by 10%","Decrease 80 by 25%"],"Linear equations":["Solve 2x-3=7","y=2x+5 find y when x=3"],"Quadratics":["Solve x^2-5x+6=0","Factorise x^2+7x+10"],"Probability":["Probability of rolling a 6","Probability of heads 3 flips"],"Trigonometry":["sin 30°=?","cos 60°=?","tan 45°=?"],"Vectors":["Vector addition","Find magnitude of vector","Vector subtraction"]},
"Combined Science (AQA Gateway)":{"Cell biology":["What is mitosis?","Function of nucleus","Function of cell membrane"],"Organisation":["Function of heart","Structure of digestive system","Enzymes role"],"Infection and response":["What is immunity?","What is a virus?","Vaccines function"],"Atomic structure":["Structure of atom","Electron configuration","What is isotope?"],"Bonding":["Ionic bonding example","Covalent bonding example","Metallic bonding"],"Energy changes":["Exothermic vs endothermic","Activation energy","Example of energy change"],"Forces":["Newton's 1st law","Calculate speed","Momentum formula"],"Electricity":["Ohm's law","Voltage formula","Series & parallel circuits"]},
"Computer Science (OCR)":{"Systems architecture":["CPU components","Von Neumann architecture","Purpose of ALU"],"Memory":["RAM vs ROM","Volatile memory?","Memory uses"],"Storage":["HDD vs SSD","Advantages of SSD","Optical storage"],"Networks":["LAN vs WAN","IP address function","Network topology types"],"Cyber security":["Phishing definition","Malware examples","How to protect data"],"Algorithms":["Bubble sort explanation","Linear search","Binary search"],"Programming":["Write a loop","Define function","Variable types"]},
"Geography (AQA)":{"Natural hazards":["Causes of earthquakes?","Causes of volcanoes","Tsunami formation"],"Rivers":["Erosion types","Deposition examples","River features"],"Coasts":["Wave types","Coastal erosion","Management strategies"],"Ecosystems":["Rainforest species","Food chain example","Biodiversity importance"],"Urban issues":["Urbanisation problems","Housing challenges","Transport issues"],"Resource management":["Water management","Energy resources","Sustainable strategies"]},
"German (AQA)":{"Family":["Translate: My mother is kind","Bruder = brother","Ich habe zwei Geschwister"],"School":["Translate: I go to school","Lehrer = teacher","Describe your classroom"],"Free time":["Hobbies vocab","Sport activities","Translate your weekend plans"],"Technology":["Computer vocab","Smartphone phrases","Social media verbs"],"Holidays":["Translate: I am on holiday","Booking hotel vocab","Airport phrases"],"Future plans":["Ich werde...","Career ambitions","Study plans"]},
"English (AQA)":{"Language paper 1":["Define metaphor","Simile examples","Identify language techniques"],"Language paper 2":["Analyze a text","Writer’s purpose","Context questions"],"Creative writing":["Describe a storm","Write a story opening","Character description"],"Analysis skills":["Identify themes","Explain quotes","Compare texts"]},
"Media Studies":{"Media language":["Define codes","Signifier examples","Editing techniques"],"Representation":["What is representation?","Stereotype examples","Audience impact"],"Audience":["Target audience examples","Demographics","Media effects"],"Industry":["Media companies","Ownership","Funding sources"],"Case studies":["Specific case study","Analyse campaign","Evaluate media product"]}
};

// ===== XP / Streak / Level =====
let xp = parseInt(localStorage.getItem("xp")||0);
let streak = parseInt(localStorage.getItem("streak")||0);
function updateXP(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp/100)+1;
  document.getElementById("streak").innerText = streak;
}

// ===== Populate Subjects / Topics =====
const subjectSelect = document.getElementById("subjectSelect");
const topicSelect = document.getElementById("topicSelect");
for(let subject in questionBank){
  let opt = document.createElement("option"); opt.value=subject; opt.textContent=subject; subjectSelect.appendChild(opt);
}
function updateTopics(){
  topicSelect.innerHTML="";
  let subj = subjectSelect.value;
  for(let topic in questionBank[subj]){
    let opt = document.createElement("option"); opt.value=topic; opt.textContent=topic; topicSelect.appendChild(opt);
  }
}
subjectSelect.addEventListener("change",updateTopics);
updateTopics();
updateXP();

// ===== Generate Question =====
const progressFill = document.getElementById("quizProgress");
document.getElementById("generateQuestionBtn").addEventListener("click",()=>{
  let subj = subjectSelect.value;
  let top = topicSelect.value;
  let list = questionBank[subj][top];
  let q = list[Math.floor(Math.random()*list.length)];
  document.getElementById("question").innerText = q;
  xp += 10; streak += 1; localStorage.setItem("xp",xp); localStorage.setItem("streak",streak);
  updateXP();
  let percent = Math.min(Math.floor(xp/12),100);
  progressFill.style.width = percent + "%";
  progressFill.innerText = percent+"%";
  confetti();
  updateChart(subj);
});

// ===== Dark Mode =====
document.getElementById("darkBtn").addEventListener("click",()=>{document.body.classList.toggle("dark");});

// ===== Timer =====
let time = 1500; let timer;
document.getElementById("startTimerBtn").addEventListener("click",()=>{
  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    let m=Math.floor(time/60); let s=time%60;
    document.getElementById("timer").innerText=m+":"+(s<10?"0":"")+s;
    if(time<=0) clearInterval(timer);
  },1000);
});
document.getElementById("resetTimerBtn").addEventListener("click",()=>{
  clearInterval(timer); time=1500; document.getElementById("timer").innerText="25:00";
});

// ===== Chart =====
const ctx = document.getElementById("chart");
const chart = new Chart(ctx,{type:"line",data:{labels:["Start"],datasets:[]},options:{responsive:true,plugins:{legend:{display:true}}}});
function updateChart(subject){
  let ds = chart.data.datasets.find(d=>d.label===subject);
  if(!ds){ds={label:subject,data:[]}; chart.data.datasets.push(ds);}
  ds.data.push(xp);
  chart.data.labels.push("Study "+chart.data.labels.length);
  chart.update();
}

// ===== Colors for Timetable =====
const subjectColors = {"Maths (OCR)":"#4f7cff","Combined Science (AQA Gateway)":"#34c759","Computer Science (OCR)":"#ff9500","Geography (AQA)":"#ff2d55","German (AQA)":"#5856d6","English (AQA)":"#ffcc00","Media Studies":"#ff3b30"};

// ===== Timetable =====
document.getElementById("generateTimetableBtn").addEventListener("click", () => {
  const days = parseInt(document.getElementById("days").value);
  if(!days || days <= 0){alert("Enter a valid number of days"); return;}
  const container = document.getElementById("timetableContainer");
  container.innerHTML = "";
  const subjectsList = Object.keys(questionBank);
  const table = document.createElement("table");
  const headerRow = document.createElement("tr");
  headerRow.innerHTML = "<th>Day</th><th>Session 1</th><th>Session 2</th><th>Session 3</th>";
  table.appendChild(headerRow);
  for(let i=1;i<=days;i++){
    const row = document.createElement("tr");
    const dayCell = document.createElement("td"); dayCell.innerText="Day "+i; dayCell.style.fontWeight="bold"; row.appendChild(dayCell);
    for(let s=0;s<3;s++){
      const subj = subjectsList[Math.floor(Math.random()*subjectsList.length)];
      const topics = Object.keys(questionBank[subj]);
      const topic = topics[Math.floor(Math.random()*topics.length)];
      const cell = document.createElement("td"); cell.innerText=`${subj}: ${topic}`;
      cell.style.backgroundColor=subjectColors[subj]||"#888"; cell.style.color="white"; cell.style.fontWeight="bold"; cell.style.cursor="pointer"; cell.style.borderRadius="8px";
      cell.addEventListener("click",()=>{
        subjectSelect.value=subj; updateTopics(); topicSelect.value=topic; document.getElementById("generateQuestionBtn").click();
      });
      row.appendChild(cell);
    }
    table.appendChild(row);
  }
  container.appendChild(table);
});

// ===== Confetti =====
function confetti(){
  const duration = 1*1000; const end = Date.now()+duration;
  (function frame(){
    if(Date.now() > end) return;
    const conf = document.createElement("div");
    conf.innerText="🎉";
    conf.style.position="fixed"; conf.style.fontSize="24px";
    conf.style.left=Math.random()*window.innerWidth+"px";
    conf.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),1000);
    requestAnimationFrame(frame);
  })();
}
</script>
</body>
</html>
